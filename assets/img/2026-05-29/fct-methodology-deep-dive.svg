<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 470" width="900" height="470" role="img" aria-label="FCT is the final gate before Box Build: a board runs through power-on, communication, sensor read, actuator drive, firmware boot, and calibration; passing all six releases it. ICT checks parts are present, FCT checks the board functions, and together they reach 98 percent-plus defect coverage">
  <style>
    text{font-family:'Segoe UI',Roboto,'Helvetica Neue',Arial,sans-serif}
    .title{font-size:23px;font-weight:700;fill:#1f2933}
    .sub{font-size:13.5px;fill:#52606d}
    .num{font-size:11px;font-weight:700;fill:#1c5fa8}
    .nm{font-size:13px;font-weight:700;fill:#1f2933}
    .det{font-size:10.5px;fill:#52606d}
    .ph{font-size:14px;font-weight:700}
    .li{font-size:12.5px;fill:#1f2933}
    .lbl{font-size:10px;font-weight:700;letter-spacing:1px}
    .gate{font-size:14px;font-weight:700;fill:#1c7a3f}
    .foot{font-size:13px;fill:#3e4c59}
  </style>
  <rect width="900" height="470" fill="#ffffff"/>
  <text x="30" y="40" class="title">FCT: Functional Test from Power-On to Calibration</text>
  <text x="30" y="64" class="sub">FCT is the final gate before Box Build &#8212; it proves the board does its job, not just that the parts are present.</text>

  <defs>
    <marker id="fa" markerWidth="9" markerHeight="9" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 z" fill="#5fa1de"/></marker>
  </defs>

  <!-- 6 stage chips -->
  <g>
    <rect x="24"  y="98" width="130" height="82" rx="10" fill="#e7f1fb" stroke="#9ec5f0"/>
    <text x="89"  y="124" text-anchor="middle" class="num">1</text>
    <text x="89"  y="146" text-anchor="middle" class="nm">Power-On</text>
    <text x="89"  y="165" text-anchor="middle" class="det">rail sequence</text>

    <rect x="168" y="98" width="130" height="82" rx="10" fill="#e7f1fb" stroke="#9ec5f0"/>
    <text x="233" y="124" text-anchor="middle" class="num">2</text>
    <text x="233" y="146" text-anchor="middle" class="nm">Comms</text>
    <text x="233" y="165" text-anchor="middle" class="det">link up</text>

    <rect x="312" y="98" width="130" height="82" rx="10" fill="#e7f1fb" stroke="#9ec5f0"/>
    <text x="377" y="124" text-anchor="middle" class="num">3</text>
    <text x="377" y="146" text-anchor="middle" class="nm">Sensors</text>
    <text x="377" y="165" text-anchor="middle" class="det">ADC in range</text>

    <rect x="456" y="98" width="130" height="82" rx="10" fill="#e7f1fb" stroke="#9ec5f0"/>
    <text x="521" y="124" text-anchor="middle" class="num">4</text>
    <text x="521" y="146" text-anchor="middle" class="nm">Actuators</text>
    <text x="521" y="165" text-anchor="middle" class="det">drive under load</text>

    <rect x="600" y="98" width="130" height="82" rx="10" fill="#e7f1fb" stroke="#9ec5f0"/>
    <text x="665" y="124" text-anchor="middle" class="num">5</text>
    <text x="665" y="146" text-anchor="middle" class="nm">Firmware</text>
    <text x="665" y="165" text-anchor="middle" class="det">flash + verify</text>

    <rect x="744" y="98" width="130" height="82" rx="10" fill="#e7f1fb" stroke="#9ec5f0"/>
    <text x="809" y="124" text-anchor="middle" class="num">6</text>
    <text x="809" y="146" text-anchor="middle" class="nm">Calibration</text>
    <text x="809" y="165" text-anchor="middle" class="det">trim to spec</text>
  </g>
  <line x1="154" y1="139" x2="168" y2="139" stroke="#5fa1de" stroke-width="2" marker-end="url(#fa)"/>
  <line x1="298" y1="139" x2="312" y2="139" stroke="#5fa1de" stroke-width="2" marker-end="url(#fa)"/>
  <line x1="442" y1="139" x2="456" y2="139" stroke="#5fa1de" stroke-width="2" marker-end="url(#fa)"/>
  <line x1="586" y1="139" x2="600" y2="139" stroke="#5fa1de" stroke-width="2" marker-end="url(#fa)"/>
  <line x1="730" y1="139" x2="744" y2="139" stroke="#5fa1de" stroke-width="2" marker-end="url(#fa)"/>

  <!-- gate bar -->
  <rect x="24" y="200" width="850" height="44" rx="10" fill="#e6f4ea" stroke="#9ed6ad"/>
  <text x="449" y="227" text-anchor="middle" class="gate">PASS all six &#8594; release to Box Build</text>

  <!-- coverage -->
  <rect x="24" y="266" width="412" height="132" rx="12" fill="#f4f5f7" stroke="#cbd2d9"/>
  <text x="44" y="293" class="ph" fill="#1f2933">Coverage</text>
  <text x="44" y="321" class="li">&#183;  ICT verifies parts are <tspan font-style="italic">present &amp; correct</tspan></text>
  <text x="44" y="345" class="li">&#183;  FCT verifies the board <tspan font-style="italic">functions</tspan></text>
  <text x="44" y="375" class="li" font-weight="700" fill="#1c7a3f">&#183;  Together: 98%+ defect coverage</text>

  <!-- cost -->
  <rect x="462" y="266" width="412" height="132" rx="12" fill="#fff7e6" stroke="#f0cf8a"/>
  <text x="482" y="293" class="ph" fill="#9e6b00">Cost &amp; throughput</text>
  <text x="482" y="321" class="li">&#183;  NRE: &#3647;58K &#8211; &#3647;203K per fixture</text>
  <text x="482" y="345" class="li">&#183;  ~&#3647;100 per test point</text>
  <text x="482" y="369" class="li">&#183;  Time per board: seconds to minutes</text>

  <text x="30" y="436" class="foot">ICT asks &#8220;is it built right?&#8221; FCT asks &#8220;does it work?&#8221; &#8212; you need both before the board ships.</text>
</svg>
