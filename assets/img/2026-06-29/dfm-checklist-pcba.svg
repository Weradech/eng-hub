<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 470" width="900" height="470" role="img" aria-label="DFM is the cheapest quality gate in NPI: a layout issue costs nothing to fix at EVT, some rework at prototype, and 10,000 to 100,000 baht in production. The review checks SMT placement, reflow solder, wave solder, pick and place, and test access">
  <style>
    text{font-family:'Segoe UI',Roboto,'Helvetica Neue',Arial,sans-serif}
    .title{font-size:23px;font-weight:700;fill:#1f2933}
    .sub{font-size:13.5px;fill:#52606d}
    .ph{font-size:15px;font-weight:700}
    .bl{font-size:12px;font-weight:700;fill:#1f2933}
    .bv{font-size:11px;fill:#52606d}
    .cat{font-size:13.5px;font-weight:700;fill:#1f2933}
    .det{font-size:11.5px;fill:#52606d}
    .foot{font-size:13px;fill:#3e4c59}
  </style>
  <rect width="900" height="470" fill="#ffffff"/>
  <text x="30" y="40" class="title">DFM: The Cheapest Quality Gate in NPI</text>
  <text x="30" y="64" class="sub">The same fix costs &#3647;0 at EVT layout and &#3647;10K&#8211;&#3647;100K in production. Catch it on the screen, not on the line.</text>

  <defs>
    <marker id="da" markerWidth="10" markerHeight="10" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 z" fill="#b03a2e"/></marker>
  </defs>

  <!-- LEFT: cost escalation -->
  <rect x="24" y="90" width="380" height="308" rx="12" fill="#fafbfc" stroke="#cbd2d9"/>
  <text x="44" y="118" class="ph" fill="#1f2933">Cost to fix the same issue</text>
  <line x1="60" y1="360" x2="384" y2="360" stroke="#cbd2d9" stroke-width="1.5"/>

  <rect x="78"  y="330" width="74" height="30"  rx="4" fill="#9ed6ad" stroke="#5cae7e"/>
  <text x="115" y="380" text-anchor="middle" class="bl">EVT layout</text>
  <text x="115" y="396" text-anchor="middle" class="bv">&#3647;0</text>

  <rect x="178" y="246" width="74" height="114" rx="4" fill="#f0cf8a" stroke="#d9a93a"/>
  <text x="215" y="380" text-anchor="middle" class="bl">Prototype</text>
  <text x="215" y="396" text-anchor="middle" class="bv">rework + delay</text>

  <rect x="278" y="150" width="74" height="210" rx="4" fill="#e8a79c" stroke="#b03a2e"/>
  <text x="315" y="380" text-anchor="middle" class="bl">Production</text>
  <text x="315" y="396" text-anchor="middle" class="bv">&#3647;10K&#8211;100K</text>

  <line x1="95" y1="322" x2="320" y2="140" stroke="#b03a2e" stroke-width="2.5" stroke-dasharray="5 4" marker-end="url(#da)"/>

  <!-- RIGHT: checklist categories -->
  <rect x="430" y="90" width="446" height="308" rx="12" fill="#e7f1fb" stroke="#9ec5f0"/>
  <text x="450" y="118" class="ph" fill="#1c5fa8">What the DFM review checks</text>

  <circle cx="460" cy="152" r="5" fill="#1c7ed6"/>
  <text x="476" y="157" class="cat">SMT placement</text>
  <text x="476" y="175" class="det">spacing, courtyard, orientation, polarity</text>

  <circle cx="460" cy="200" r="5" fill="#1c7ed6"/>
  <text x="476" y="205" class="cat">Reflow solder</text>
  <text x="476" y="223" class="det">thermal balance, no part shadowing</text>

  <circle cx="460" cy="248" r="5" fill="#1c7ed6"/>
  <text x="476" y="253" class="cat">Wave solder (THU)</text>
  <text x="476" y="271" class="det">flow direction, thieving pads, shadowing</text>

  <circle cx="460" cy="296" r="5" fill="#1c7ed6"/>
  <text x="476" y="301" class="cat">Pick &amp; place</text>
  <text x="476" y="319" class="det">fiducials, edge clearance, panel rails</text>

  <circle cx="460" cy="344" r="5" fill="#1c7ed6"/>
  <text x="476" y="349" class="cat">Test access</text>
  <text x="476" y="367" class="det">probe points, no test pads under BGA</text>

  <text x="30" y="436" class="foot">DFM is a design review, not an inspection &#8212; the one gate that costs nothing to pass and a fortune to skip.</text>
</svg>
