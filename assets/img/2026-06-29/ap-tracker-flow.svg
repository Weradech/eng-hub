<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 470" width="900" height="470" role="img" aria-label="AP Tracker closes the loop: a PO from Odoo and a GR from WMS auto-import, the tracker matches them by PO number and walks the state machine to a manual payment gate">
  <style>
    text{font-family:'Segoe UI',Roboto,'Helvetica Neue',Arial,sans-serif}
    .title{font-size:23px;font-weight:700;fill:#1f2933}
    .sub{font-size:13.5px;fill:#52606d}
    .wh{font-size:13.5px;font-weight:700;fill:#ffffff}
    .whs{font-size:11px;fill:#cbd2d9}
    .bx{font-size:13px;font-weight:700;fill:#1f2933}
    .bxs{font-size:11px;fill:#52606d}
    .lbl{font-size:10.5px;font-weight:700;letter-spacing:.5px}
    .st{font-size:12px;font-weight:700}
    .stn{font-size:10.5px;fill:#52606d}
    .key{font-size:11.5px;font-weight:700;fill:#1c5fa8}
    .foot{font-size:13px;fill:#3e4c59}
  </style>
  <rect width="900" height="470" fill="#ffffff"/>
  <text x="30" y="40" class="title">AP Tracker: closing the PO &#8594; GR &#8594; payment loop</text>
  <text x="30" y="64" class="sub">Two systems feed it, the PO number joins them, and records auto-transition until a human approves payment.</text>

  <defs>
    <marker id="ga" markerWidth="9" markerHeight="9" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 z" fill="#7b8794"/></marker>
    <marker id="gb" markerWidth="9" markerHeight="9" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 z" fill="#1c7ed6"/></marker>
    <marker id="gg" markerWidth="9" markerHeight="9" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 z" fill="#2f9e44"/></marker>
  </defs>

  <!-- SOURCE: Odoo PO -->
  <rect x="30" y="100" width="156" height="62" rx="10" fill="#2b3a4a"/>
  <text x="108" y="124" text-anchor="middle" class="wh">Odoo &#183; Purchase Order</text>
  <text x="108" y="142" text-anchor="middle" class="whs">headers, lines, supplier, terms</text>
  <text x="108" y="156" text-anchor="middle" class="whs">PO no. P02026-001234</text>

  <!-- SOURCE: WMS GR -->
  <rect x="30" y="186" width="156" height="62" rx="10" fill="#2b3a4a"/>
  <text x="108" y="210" text-anchor="middle" class="wh">WMS &#183; Goods Receipt</text>
  <text x="108" y="228" text-anchor="middle" class="whs">GRN from stock-card ledger</text>
  <text x="108" y="242" text-anchor="middle" class="whs">PO no. captured at receiving</text>

  <!-- auto-import arrows into matcher -->
  <path d="M186 131 C214 138, 226 158, 244 168" fill="none" stroke="#1c7ed6" stroke-width="2" marker-end="url(#gb)"/>
  <path d="M186 217 C214 210, 226 190, 244 180" fill="none" stroke="#1c7ed6" stroke-width="2" marker-end="url(#gb)"/>
  <text x="196" y="118" class="lbl" fill="#1c5fa8">CRON 5 MIN</text>
  <text x="196" y="248" class="lbl" fill="#1c5fa8">ORM WATCHER</text>

  <!-- MATCHER: where matching happens -->
  <rect x="248" y="120" width="208" height="108" rx="12" fill="#e7f1fb" stroke="#9ec5f0"/>
  <text x="352" y="143" text-anchor="middle" class="bx" fill="#1c5fa8">AP Tracker &#183; auto-discover</text>
  <text x="352" y="161" text-anchor="middle" class="bxs">match by supplier + date &#177;7d</text>
  <text x="352" y="176" text-anchor="middle" class="bxs">+ part-number overlap</text>
  <rect x="266" y="186" width="172" height="32" rx="8" fill="#ffffff" stroke="#9ec5f0"/>
  <text x="352" y="201" text-anchor="middle" class="key">exactly one PO &#8594; auto-link</text>
  <text x="352" y="214" text-anchor="middle" class="stn">0 or many &#8594; manual review</text>

  <!-- 85% tag -->
  <rect x="358" y="98" width="98" height="20" rx="10" fill="#e9f7ee" stroke="#a6dcb8"/>
  <text x="407" y="112" text-anchor="middle" class="lbl" fill="#2f7a37">&#10003; ~85% AUTO</text>

  <!-- arrow matcher -> state machine -->
  <path d="M456 174 L490 174" fill="none" stroke="#7b8794" stroke-width="2" marker-end="url(#ga)"/>

  <!-- STATE MACHINE column -->
  <text x="494" y="100" class="lbl" fill="#52606d">STATE MACHINE &#8212; AUTO-TRANSITION</text>

  <!-- PENDING_GR -->
  <rect x="494" y="110" width="376" height="40" rx="9" fill="#fff4e0" stroke="#f3c677"/>
  <text x="510" y="128" class="st" fill="#9a5b00">PENDING_GR</text>
  <text x="510" y="143" class="stn">PO imported, no GR linked yet</text>
  <path d="M682 150 L682 160" fill="none" stroke="#2f9e44" stroke-width="2" marker-end="url(#gg)"/>
  <text x="690" y="158" class="stn" fill="#2f7a37">GRN linked, any qty</text>

  <!-- RECEIVED -->
  <rect x="494" y="162" width="376" height="40" rx="9" fill="#e7f1fb" stroke="#9ec5f0"/>
  <text x="510" y="180" class="st" fill="#1c5fa8">RECEIVED</text>
  <text x="510" y="195" class="stn">3-way match runs &#183; partial flags here: 80/100 units</text>
  <path d="M682 202 L682 212" fill="none" stroke="#2f9e44" stroke-width="2" marker-end="url(#gg)"/>
  <text x="690" y="210" class="stn" fill="#2f7a37">GR qty &#8805; PO qty, all lines</text>

  <!-- READY_FOR_PAYMENT -->
  <rect x="494" y="214" width="376" height="40" rx="9" fill="#e9f7ee" stroke="#a6dcb8"/>
  <text x="510" y="232" class="st" fill="#2f7a37">READY_FOR_PAYMENT</text>
  <text x="510" y="247" class="stn">routed to the right approver</text>
  <path d="M682 254 L682 264" fill="none" stroke="#7b8794" stroke-width="2" marker-end="url(#ga)"/>
  <rect x="640" y="262" width="100" height="18" rx="9" fill="#fbeaea" stroke="#e3a3a3"/>
  <text x="690" y="275" text-anchor="middle" class="lbl" fill="#b02a2a">&#9888; MANUAL GATE</text>

  <!-- DONE -->
  <rect x="494" y="282" width="376" height="40" rx="9" fill="#f5f7fa" stroke="#cbd2d9"/>
  <text x="510" y="300" class="st" fill="#3e4c59">DONE</text>
  <text x="510" y="315" class="stn">a human confirms the invoice &amp; clicks DONE</text>

  <!-- join-key callout (left, below sources) -->
  <rect x="30" y="282" width="426" height="40" rx="9" fill="#e7f1fb" stroke="#9ec5f0"/>
  <text x="44" y="299" class="key">Join key across all three systems = the PO number</text>
  <text x="44" y="314" class="bxs">No new schema &#8212; a light state table (PO &#8594; status &#8594; GRN &#8594; timestamps), data read live.</text>

  <!-- footer band -->
  <rect x="30" y="392" width="840" height="44" rx="8" fill="#e7f1fb" stroke="#9ec5f0"/>
  <text x="450" y="411" text-anchor="middle" class="foot">The spreadsheet was the integration layer &#8212; AP Tracker replaced it: import, match, and surface mismatches before payment is due.</text>
  <text x="450" y="428" text-anchor="middle" class="bxs">It makes the decision obvious; it never approves the money. Payment confirmation stays a human gate.</text>
</svg>
