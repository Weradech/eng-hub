<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 470" width="900" height="470" role="img" aria-label="Tailscale adds an IPv6 ULA the OS prefers; the IPv6 packet routes into the tunnel to a dead end while the IPv4 path works, so it looks like a flaky ISP. The fix is to rank mapped-IPv4 first.">
  <style>
    text{font-family:'Segoe UI',Roboto,'Helvetica Neue',Arial,sans-serif}
    .title{font-size:23px;font-weight:700;fill:#1f2933}
    .sub{font-size:13.5px;fill:#52606d}
    .wh{font-size:13px;font-weight:700;fill:#ffffff}
    .whs{font-size:11px;fill:#cbd2d9}
    .bx{font-size:13px;font-weight:700;fill:#1f2933}
    .bxs{font-size:11.5px;fill:#52606d}
    .lbl{font-size:11px;font-weight:700;letter-spacing:.5px}
    .mono{font-family:'SFMono-Regular',Consolas,'Liberation Mono',monospace;font-size:11px}
    .end{font-size:13px;font-weight:700}
    .foot{font-size:13px;fill:#3e4c59}
  </style>
  <rect width="900" height="470" fill="#ffffff"/>
  <text x="30" y="40" class="title">Why your server quietly stopped reaching the internet</text>
  <text x="30" y="64" class="sub">Tailscale adds an IPv6 ULA the OS prefers &#8212; external packets enter the tunnel and die. SSH still works, so it reads like a flaky ISP.</text>

  <defs>
    <marker id="ga" markerWidth="9" markerHeight="9" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 z" fill="#7b8794"/></marker>
    <marker id="gr" markerWidth="9" markerHeight="9" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 z" fill="#d64545"/></marker>
    <marker id="gg" markerWidth="9" markerHeight="9" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 z" fill="#2f9e44"/></marker>
  </defs>

  <!-- DNS source node -->
  <rect x="30" y="150" width="150" height="64" rx="10" fill="#2b3a4a"/>
  <text x="105" y="176" text-anchor="middle" class="wh">DNS returns A + AAAA</text>
  <text x="105" y="194" text-anchor="middle" class="whs">external host has both records</text>
  <path d="M180 182 L214 182" fill="none" stroke="#7b8794" stroke-width="2" marker-end="url(#ga)"/>

  <!-- selection decision -->
  <rect x="216" y="148" width="166" height="68" rx="10" fill="#fff4e0" stroke="#f3c677"/>
  <text x="299" y="172" text-anchor="middle" class="bx" fill="#9a5b00">RFC 6724 picks source</text>
  <text x="299" y="190" text-anchor="middle" class="bxs">ULA outranks IPv4 by</text>
  <text x="299" y="206" text-anchor="middle" class="bxs">default on most Linux</text>

  <!-- branch: chosen (up, red) -->
  <path d="M382 168 C414 156, 430 132, 452 126" fill="none" stroke="#d64545" stroke-width="2.5" marker-end="url(#gr)"/>
  <text x="392" y="140" class="lbl" fill="#b02a2a">CHOSEN</text>

  <!-- branch: ignored (down, green) -->
  <path d="M382 196 C414 208, 430 232, 452 238" fill="none" stroke="#2f9e44" stroke-width="2" marker-end="url(#gg)"/>
  <text x="396" y="232" class="lbl" fill="#2f7a37">IGNORED</text>

  <!-- TOP red path: tailscale0 ULA -->
  <rect x="454" y="98" width="200" height="56" rx="10" fill="#fbeaea" stroke="#e3a3a3"/>
  <text x="554" y="120" text-anchor="middle" class="bx" fill="#b02a2a">src tailscale0 (fd7a:&#8230;)</text>
  <text x="554" y="138" text-anchor="middle" class="mono" fill="#a61b1b">packet &#8594; mesh tunnel</text>
  <path d="M654 126 L688 126" fill="none" stroke="#d64545" stroke-width="2.5" marker-end="url(#gr)"/>
  <rect x="690" y="98" width="180" height="56" rx="10" fill="#ffecec" stroke="#d64545"/>
  <text x="780" y="120" text-anchor="middle" class="end" fill="#b02a2a">Dead end</text>
  <text x="780" y="138" text-anchor="middle" class="bxs" fill="#a61b1b">no exit node &#183; silently dropped</text>

  <!-- BOTTOM green path: eth0 IPv4 -->
  <rect x="454" y="210" width="200" height="56" rx="10" fill="#e9f7ee" stroke="#a6dcb8"/>
  <text x="554" y="232" text-anchor="middle" class="bx" fill="#2f7a37">src eth0 (192.168.x.x)</text>
  <text x="554" y="250" text-anchor="middle" class="mono" fill="#2f7a37">packet &#8594; real gateway</text>
  <path d="M654 238 L688 238" fill="none" stroke="#2f9e44" stroke-width="2" marker-end="url(#gg)"/>
  <rect x="690" y="210" width="180" height="56" rx="10" fill="#eafaf0" stroke="#2f9e44"/>
  <text x="780" y="232" text-anchor="middle" class="end" fill="#2f7a37">200 OK</text>
  <text x="780" y="250" text-anchor="middle" class="bxs" fill="#2f7a37">the path that would have worked</text>

  <!-- looks-like vs real-cause band -->
  <rect x="30" y="290" width="410" height="56" rx="10" fill="#fbeaea" stroke="#e3a3a3"/>
  <text x="48" y="312" class="lbl" fill="#d64545">&#10007; LOOKS LIKE</text>
  <text x="48" y="334" class="bxs" fill="#a61b1b">&#8220;The ISP is flaky&#8221; &#8212; some hosts hang, others are fine</text>

  <rect x="460" y="290" width="410" height="56" rx="10" fill="#e9f7ee" stroke="#a6dcb8"/>
  <text x="478" y="312" class="lbl" fill="#2f9e44">&#10003; REAL CAUSE</text>
  <text x="478" y="334" class="bxs" fill="#2f7a37">A/AAAA split: IPv4 requests pass, IPv6 ULA requests die</text>

  <!-- fix band -->
  <rect x="30" y="356" width="840" height="56" rx="10" fill="#e7f1fb" stroke="#9ec5f0"/>
  <text x="48" y="378" class="lbl" fill="#1c7ed6">FIX</text>
  <text x="48" y="398" class="bxs" fill="#1c5fa8">gai.conf: rank mapped-IPv4 first (precedence ::ffff:0:0/96 100)</text>
  <text x="470" y="378" class="lbl" fill="#1c7ed6">OR</text>
  <text x="470" y="398" class="bxs" fill="#1c5fa8">disable IPv6 on tailscale0 &#183; verify with ip route get &lt;ipv6&gt;</text>

  <rect x="30" y="426" width="840" height="32" rx="8" fill="#e7f1fb" stroke="#9ec5f0"/>
  <text x="450" y="447" text-anchor="middle" class="foot">A 200 from one host and a timeout from another isn&#8217;t a flaky network &#8212; it&#8217;s source-address selection.</text>
</svg>
