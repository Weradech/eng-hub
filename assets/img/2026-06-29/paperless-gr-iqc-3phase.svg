<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 470" width="900" height="470" role="img" aria-label="Going paperless on GR to IQC in three phases: Phase 1 hybrid with digital primary and paper backup, Phase 2 paper only on demand, Phase 3 fully digital. Paper reliance drops from 100 percent to about 30 percent to zero across the phases, each taking 8 to 12 weeks">
  <style>
    text{font-family:'Segoe UI',Roboto,'Helvetica Neue',Arial,sans-serif}
    .title{font-size:23px;font-weight:700;fill:#1f2933}
    .sub{font-size:13.5px;fill:#52606d}
    .pn{font-size:11px;font-weight:700;letter-spacing:1px}
    .ph{font-size:16px;font-weight:700;fill:#1f2933}
    .dur{font-size:11px;font-weight:700;fill:#1c5fa8}
    .li{font-size:12px;fill:#1f2933}
    .pk{font-size:10px;font-weight:700;letter-spacing:.5px;fill:#7b8794}
    .foot{font-size:13px;fill:#3e4c59}
  </style>
  <rect width="900" height="470" fill="#ffffff"/>
  <text x="30" y="40" class="title">Going Paperless on GR &#8594; IQC: A 3-Phase Plan</text>
  <text x="30" y="64" class="sub">Full paperless from day 1 fails &#8212; operators use paper as a cognitive anchor. Digitise the process, not the resistance.</text>

  <defs>
    <marker id="pa" markerWidth="10" markerHeight="10" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 z" fill="#7b8794"/></marker>
  </defs>

  <!-- Phase 1 -->
  <rect x="24" y="90" width="270" height="300" rx="12" fill="#fdecea" stroke="#e8a79c"/>
  <text x="44" y="118" class="pn" fill="#b03a2e">PHASE 1</text>
  <text x="44" y="142" class="ph">Hybrid</text>
  <text x="44" y="162" class="dur" fill="#b03a2e">8&#8211;12 weeks</text>
  <text x="44" y="196" class="pk">PAPER RELIANCE</text>
  <rect x="44" y="206" width="206" height="16" rx="4" fill="#f3d6d1"/>
  <rect x="44" y="206" width="206" height="16" rx="4" fill="#e8836f"/>
  <text x="250" y="219" text-anchor="end" class="li" fill="#7a2c22" font-weight="700">100%</text>
  <text x="44" y="256" class="li">Digital is primary,</text>
  <text x="44" y="276" class="li">paper is the safety net.</text>
  <text x="44" y="304" class="li">Every record entered twice</text>
  <text x="44" y="324" class="li">&#8212; trust is being built.</text>

  <!-- Phase 2 -->
  <rect x="315" y="90" width="270" height="300" rx="12" fill="#fff7e6" stroke="#f0cf8a"/>
  <text x="335" y="118" class="pn" fill="#9e6b00">PHASE 2</text>
  <text x="335" y="142" class="ph">On-Demand Paper</text>
  <text x="335" y="162" class="dur" fill="#9e6b00">8&#8211;12 weeks</text>
  <text x="335" y="196" class="pk">PAPER RELIANCE</text>
  <rect x="335" y="206" width="206" height="16" rx="4" fill="#f6ead0"/>
  <rect x="335" y="206" width="62" height="16" rx="4" fill="#e0a93a"/>
  <text x="541" y="219" text-anchor="end" class="li" fill="#7a5400" font-weight="700">~30%</text>
  <text x="335" y="256" class="li">Digital is the record.</text>
  <text x="335" y="276" class="li">Paper printed only when</text>
  <text x="335" y="296" class="li">someone asks for it.</text>
  <text x="335" y="324" class="li">Demand falls on its own.</text>

  <!-- Phase 3 -->
  <rect x="606" y="90" width="270" height="300" rx="12" fill="#e6f4ea" stroke="#9ed6ad"/>
  <text x="626" y="118" class="pn" fill="#1c7a3f">PHASE 3</text>
  <text x="626" y="142" class="ph">100% Digital</text>
  <text x="626" y="162" class="dur" fill="#1c7a3f">steady state</text>
  <text x="626" y="196" class="pk">PAPER RELIANCE</text>
  <rect x="626" y="206" width="206" height="16" rx="4" fill="#d8ecdf"/>
  <text x="832" y="219" text-anchor="end" class="li" fill="#1c7a3f" font-weight="700">0%</text>
  <text x="626" y="256" class="li">Paper path is removed.</text>
  <text x="626" y="276" class="li">Digital trust signals</text>
  <text x="626" y="296" class="li">are the only record.</text>
  <text x="626" y="324" class="li">Audit-ready by default.</text>

  <line x1="296" y1="240" x2="313" y2="240" stroke="#7b8794" stroke-width="2.5" marker-end="url(#pa)"/>
  <line x1="587" y1="240" x2="604" y2="240" stroke="#7b8794" stroke-width="2.5" marker-end="url(#pa)"/>

  <text x="30" y="430" class="foot">8&#8211;12 weeks per phase. Rush it and you create more paper, not less &#8212; the resistance just routes around the system.</text>
</svg>
