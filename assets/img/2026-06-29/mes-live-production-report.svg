<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 470" width="900" height="470" role="img" aria-label="A static deck is stale the moment it is made; a standalone HTML report that fetches the MES traceability API at generation time is always accurate">
  <style>
    text{font-family:'Segoe UI',Roboto,'Helvetica Neue',Arial,sans-serif}
    .title{font-size:23px;font-weight:700;fill:#1f2933}
    .sub{font-size:13.5px;fill:#52606d}
    .ph{font-size:15px;font-weight:700}
    .li{font-size:12.5px;fill:#1f2933}
    .cap{font-size:11.5px;fill:#52606d}
    .out{font-size:13px;font-weight:700}
    .mono{font-family:'SFMono-Regular',Consolas,'Liberation Mono',monospace;font-size:11.5px;fill:#1f2933}
    .api{font-family:'SFMono-Regular',Consolas,'Liberation Mono',monospace;font-size:11px;font-weight:700;fill:#ffffff}
    .foot{font-size:13px;fill:#3e4c59}
  </style>
  <rect width="900" height="470" fill="#ffffff"/>
  <text x="30" y="40" class="title">Live data at generation time beats a static deck 10&#215;</text>
  <text x="30" y="64" class="sub">One API call + one standalone HTML file = an accurate, shareable view of the floor &#8212; no dashboard server, no login.</text>

  <defs>
    <marker id="gg" markerWidth="9" markerHeight="9" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 z" fill="#2f9e44"/></marker>
  </defs>

  <!-- LEFT: static deck -->
  <rect x="24" y="84" width="408" height="334" rx="12" fill="#fbeaea" stroke="#e3a3a3"/>
  <text x="44" y="112" class="ph" fill="#b02a2a">&#10007; Static PowerPoint snapshot</text>

  <!-- slide stack -->
  <rect x="60" y="130" width="200" height="92" rx="6" fill="#ffffff" stroke="#e3a3a3"/>
  <rect x="52" y="138" width="200" height="92" rx="6" fill="#ffffff" stroke="#e3a3a3"/>
  <rect x="44" y="146" width="200" height="92" rx="6" fill="#ffffff" stroke="#d64545"/>
  <rect x="56" y="158" width="92" height="14" rx="3" fill="#f2c4c4"/>
  <rect x="56" y="180" width="176" height="9" rx="3" fill="#efd2d2"/>
  <rect x="56" y="194" width="176" height="9" rx="3" fill="#efd2d2"/>
  <rect x="56" y="208" width="120" height="9" rx="3" fill="#efd2d2"/>

  <text x="262" y="174" class="cap" fill="#b02a2a">copy-pasted</text>
  <text x="262" y="190" class="cap" fill="#b02a2a">screenshots,</text>
  <text x="262" y="206" class="cap" fill="#b02a2a">typed by hand</text>

  <text x="44" y="262" class="li" fill="#b02a2a">&#10007;  stale the moment the slide is saved</text>
  <text x="44" y="286" class="li" fill="#b02a2a">&#10007;  manually assembled &#183; transcription errors</text>
  <text x="44" y="310" class="li" fill="#b02a2a">&#10007;  no link back to the source numbers</text>

  <rect x="104" y="332" width="248" height="34" rx="10" fill="#ffffff" stroke="#d64545"/>
  <text x="228" y="354" text-anchor="middle" class="out" fill="#b02a2a">obsolete on arrival</text>

  <text x="44" y="396" class="cap">Last refreshed: whenever someone remembered.</text>

  <!-- RIGHT: live HTML report -->
  <rect x="468" y="84" width="408" height="334" rx="12" fill="#e9f7ee" stroke="#a6dcb8"/>
  <text x="488" y="112" class="ph" fill="#2f7a37">&#10003; Standalone HTML, live at build</text>

  <!-- API node -->
  <rect x="488" y="128" width="368" height="34" rx="8" fill="#2b3a4a"/>
  <text x="500" y="150" class="api">GET /api/trace/analytics</text>
  <text x="846" y="150" text-anchor="end" class="api" fill="#9aa5b1">fpy &#183; steps &#183; jigs &#183; daily</text>

  <!-- arrow down -->
  <path d="M672 162 L672 184" fill="none" stroke="#2f9e44" stroke-width="2" marker-end="url(#gg)"/>
  <text x="690" y="180" class="cap" fill="#2f7a37">fetched at generation time</text>

  <!-- report card with mini chart + donut -->
  <rect x="488" y="190" width="368" height="118" rx="8" fill="#f5fbf6" stroke="#a6dcb8"/>
  <text x="500" y="210" class="li" fill="#2f7a37" font-weight="700">production-report.html</text>
  <!-- KPI chips -->
  <rect x="500" y="220" width="74" height="30" rx="5" fill="#ffffff" stroke="#a6dcb8"/>
  <text x="537" y="240" text-anchor="middle" class="mono" font-weight="700">FPY 86%</text>
  <rect x="582" y="220" width="74" height="30" rx="5" fill="#ffffff" stroke="#a6dcb8"/>
  <text x="619" y="240" text-anchor="middle" class="mono" font-weight="700">DONE 398</text>
  <!-- mini grouped bars -->
  <g>
    <rect x="510" y="280" width="9" height="18" fill="#22c55e"/>
    <rect x="520" y="288" width="9" height="10" fill="#ef4444"/>
    <rect x="534" y="272" width="9" height="26" fill="#22c55e"/>
    <rect x="544" y="290" width="9" height="8" fill="#ef4444"/>
    <rect x="558" y="276" width="9" height="22" fill="#22c55e"/>
    <rect x="568" y="284" width="9" height="14" fill="#ef4444"/>
  </g>
  <text x="510" y="270" class="cap">daily pass / fail</text>
  <!-- donut -->
  <circle cx="700" cy="282" r="22" fill="none" stroke="#22c55e" stroke-width="9"/>
  <path d="M700 260 A22 22 0 0 1 718 295" fill="none" stroke="#1c7ed6" stroke-width="9"/>
  <path d="M718 295 A22 22 0 0 1 700 304" fill="none" stroke="#ef4444" stroke-width="9"/>
  <text x="760" y="276" class="cap">DONE</text>
  <text x="760" y="291" class="cap">TESTED</text>
  <text x="760" y="306" class="cap">TEST_FAIL</text>

  <text x="488" y="332" class="li" fill="#2f7a37">&#10003;  always current &#183; numbers trace to the API</text>
  <text x="488" y="356" class="li" fill="#2f7a37">&#10003;  email, print-to-PDF, or drop on Pages</text>
  <text x="488" y="380" class="li" fill="#2f7a37">&#10003;  no server, no auth surface, no login</text>

  <text x="488" y="404" class="cap">Data baked in at build &#8212; the snapshot is the artifact.</text>

  <rect x="30" y="430" width="840" height="32" rx="8" fill="#e7f1fb" stroke="#9ec5f0"/>
  <text x="450" y="451" text-anchor="middle" class="foot">For live monitoring, use the shop-floor UI. For reporting, the HTML that fetches at build time wins on accuracy &amp; portability.</text>
</svg>
