<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 470" width="900" height="470" role="img" aria-label="Three parties bound by one contract: the SQLAlchemy model, the Alembic revision, and the live database schema must all agree, or they drift and break">
  <style>
    text{font-family:'Segoe UI',Roboto,'Helvetica Neue',Arial,sans-serif}
    .title{font-size:23px;font-weight:700;fill:#1f2933}
    .sub{font-size:13.5px;fill:#52606d}
    .node{font-size:14px;font-weight:700;fill:#ffffff}
    .nodesub{font-size:11px;fill:#cbd2d9}
    .seal{font-size:11px;font-weight:700;letter-spacing:.5px;fill:#1c5fa8}
    .bh{font-size:13px;font-weight:700;fill:#b02a2a}
    .br{font-size:12px;fill:#1f2933}
    .lbl{font-size:10px;font-weight:700;letter-spacing:1px}
    .mono{font-family:'SFMono-Regular',Consolas,'Liberation Mono',monospace;font-size:11px;fill:#52606d}
    .foot{font-size:13px;fill:#3e4c59}
  </style>
  <rect width="900" height="470" fill="#ffffff"/>
  <text x="30" y="40" class="title">A revision is a contract, not a convenience</text>
  <text x="30" y="64" class="sub">Three parties must stay in agreement. Skip a signature and they drift &#8212; silently, until production.</text>

  <defs>
    <marker id="bond" markerWidth="9" markerHeight="9" refX="4.5" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 z" fill="#2f9e44"/></marker>
    <marker id="ag" markerWidth="9" markerHeight="9" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 z" fill="#7b8794"/></marker>
  </defs>

  <!-- ===== LEFT: the three-party contract triangle ===== -->
  <!-- bonds (drawn first, behind nodes) -->
  <line x1="160" y1="148" x2="160" y2="300" stroke="#a6dcb8" stroke-width="3"/>
  <line x1="178" y1="130" x2="300" y2="218" stroke="#a6dcb8" stroke-width="3"/>
  <line x1="178" y1="318" x2="300" y2="238" stroke="#a6dcb8" stroke-width="3"/>
  <!-- agreement seals on the bonds -->
  <rect x="92" y="212" width="100" height="22" rx="11" fill="#e9f7ee" stroke="#a6dcb8"/>
  <text x="142" y="227" text-anchor="middle" class="seal" fill="#2f7a37">&#10003; AGREE</text>
  <rect x="196" y="158" width="74" height="22" rx="11" fill="#e9f7ee" stroke="#a6dcb8"/>
  <text x="233" y="173" text-anchor="middle" class="seal" fill="#2f7a37">&#10003; APPLIES</text>
  <rect x="196" y="272" width="84" height="22" rx="11" fill="#e9f7ee" stroke="#a6dcb8"/>
  <text x="238" y="287" text-anchor="middle" class="seal" fill="#2f7a37">&#10003; MATCHES</text>

  <!-- Node A: Model (code) -->
  <rect x="60" y="100" width="200" height="50" rx="10" fill="#2b3a4a"/>
  <text x="78" y="124" class="node">SQLAlchemy model</text>
  <text x="78" y="141" class="nodesub">the code &#183; Base.metadata</text>

  <!-- Node B: Revision (migration) -->
  <rect x="60" y="298" width="200" height="50" rx="10" fill="#2b3a4a"/>
  <text x="78" y="322" class="node">Alembic revision</text>
  <text x="78" y="339" class="nodesub">the migration history</text>

  <!-- Node C: DB schema -->
  <rect x="300" y="200" width="190" height="50" rx="10" fill="#2b3a4a"/>
  <text x="318" y="224" class="node">Live DB schema</text>
  <text x="318" y="241" class="nodesub">actual tables &amp; columns</text>

  <!-- caption under the triangle -->
  <text x="60" y="392" class="lbl" fill="#2f9e44">&#10003; IN CONTRACT</text>
  <text x="60" y="412" class="mono">autogenerate sees every model &#183; heads = current</text>

  <!-- ===== RIGHT: what breaks the contract ===== -->
  <rect x="520" y="92" width="350" height="320" rx="12" fill="#fbeaea" stroke="#e3a3a3"/>
  <path d="M520 104 a12 12 0 0 1 12 -12 h326 a12 12 0 0 1 12 12 v26 h-350 z" fill="#b02a2a"/>
  <text x="538" y="122" class="bh" fill="#ffffff">&#10007; What breaks the contract</text>

  <!-- row 1 -->
  <text x="538" y="158" class="br" fill="#a61b1b">&#8226; Model not imported in __init__.py</text>
  <text x="552" y="176" class="mono">&#8220;No changes detected&#8221; &#8594; UndefinedTable in prod</text>

  <!-- row 2 -->
  <text x="538" y="206" class="br" fill="#a61b1b">&#8226; Editing a migration already applied</text>
  <text x="552" y="224" class="mono">DB state diverges from migration history</text>

  <!-- row 3 -->
  <text x="538" y="254" class="br" fill="#a61b1b">&#8226; Deleting a revision, no compensator</text>
  <text x="552" y="272" class="mono">alembic heads &#8800; DB alembic_version</text>

  <!-- row 4 -->
  <text x="538" y="302" class="br" fill="#a61b1b">&#8226; Adding columns directly in psql</text>
  <text x="552" y="320" class="mono">schema has columns Alembic never knows about</text>

  <!-- row 5 -->
  <text x="538" y="350" class="br" fill="#a61b1b">&#8226; :: cast inside text() &#8212; not CAST()</text>
  <text x="552" y="368" class="mono">runs in psql, crashes at runtime in SQLAlchemy</text>

  <!-- divider line above footer note inside red box -->
  <text x="538" y="396" class="lbl" fill="#b02a2a">DRIFT IS SILENT UNTIL THE FIRST WRITE</text>

  <!-- footer band -->
  <rect x="30" y="428" width="840" height="32" rx="8" fill="#e7f1fb" stroke="#9ec5f0"/>
  <text x="450" y="449" text-anchor="middle" class="foot">Before every deploy: alembic heads = alembic current, and preview the SQL with --sql before you apply.</text>
</svg>
