<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" width="900" height="500" role="img" aria-label="Zero-downtime password rotation: update secret, alter role, roll containers, verify; plus the env_file dollar-escape gotcha">
  <style>
    text{font-family:'Segoe UI',Roboto,'Helvetica Neue',Arial,sans-serif}
    .title{font-size:23px;font-weight:700;fill:#1f2933}
    .sub{font-size:13.5px;fill:#52606d}
    .num{font-size:22px;font-weight:800;fill:#ffffff}
    .step{font-size:16px;font-weight:700;fill:#1f2933}
    .ex{font-size:12.5px;fill:#52606d}
    .tag{font-size:11px;font-weight:700;letter-spacing:.5px}
    .mono{font-family:'SFMono-Regular',Consolas,'Liberation Mono',monospace;font-size:12.5px;fill:#1f2933}
    .gh{font-size:13px;font-weight:700;fill:#9a5b00}
    .foot{font-size:13px;fill:#3e4c59}
  </style>
  <rect width="900" height="500" fill="#ffffff"/>
  <text x="30" y="40" class="title">Rotating a shared DB password &#8212; zero downtime</text>
  <text x="30" y="64" class="sub">Naively ALTER the role and every container drops at once. Never let the DB and the running apps disagree.</text>

  <line x1="60" y1="96" x2="60" y2="392" stroke="#1c7ed6" stroke-width="2.5"/>
  <polygon points="60,400 54,388 66,388" fill="#1c7ed6"/>
  <text x="44" y="246" transform="rotate(-90 44 246)" text-anchor="middle" class="tag" fill="#1c7ed6">ORDER MATTERS</text>

  <!-- Step 1 -->
  <g>
    <rect x="84" y="96" width="786" height="64" rx="10" fill="#e7f1fb" stroke="#9ec5f0"/>
    <circle cx="120" cy="128" r="22" fill="#1c7ed6"/>
    <text x="120" y="136" text-anchor="middle" class="num">1</text>
    <text x="160" y="124" class="step">Update the secret in the source of truth</text>
    <text x="160" y="146" class="ex">Change env_file / secrets manager first &#8212; but do NOT change it in Postgres yet.</text>
    <rect x="760" y="116" width="92" height="24" rx="12" fill="#ffffff" stroke="#1c7ed6"/>
    <text x="806" y="132" text-anchor="middle" class="tag" fill="#1c7ed6">PREP</text>
  </g>

  <!-- Step 2 -->
  <g>
    <rect x="84" y="172" width="786" height="64" rx="10" fill="#e7f1fb" stroke="#9ec5f0"/>
    <circle cx="120" cy="204" r="22" fill="#1c7ed6"/>
    <text x="120" y="212" text-anchor="middle" class="num">2</text>
    <text x="160" y="200" class="step">ALTER ROLE &#8230; PASSWORD &#8216;new&#8217;</text>
    <text x="160" y="222" class="ex">Now the database expects the new password. Open connections on the old one keep working until recycled.</text>
    <rect x="760" y="192" width="92" height="24" rx="12" fill="#ffffff" stroke="#1c7ed6"/>
    <text x="806" y="208" text-anchor="middle" class="tag" fill="#1c7ed6">SWITCH DB</text>
  </g>

  <!-- Step 3 -->
  <g>
    <rect x="84" y="248" width="786" height="64" rx="10" fill="#e7f1fb" stroke="#9ec5f0"/>
    <circle cx="120" cy="280" r="22" fill="#1c7ed6"/>
    <text x="120" y="288" text-anchor="middle" class="num">3</text>
    <text x="160" y="276" class="step">Roll the containers, one by one</text>
    <text x="160" y="298" class="ex">Recreate each container &#8594; it reads the new secret &#8594; reconnects. Per-service window, never a global cutover.</text>
    <rect x="760" y="268" width="92" height="24" rx="12" fill="#ffffff" stroke="#1c7ed6"/>
    <text x="806" y="284" text-anchor="middle" class="tag" fill="#1c7ed6">ROLL</text>
  </g>

  <!-- Step 4 -->
  <g>
    <rect x="84" y="324" width="786" height="64" rx="10" fill="#e9f7ee" stroke="#a6dcb8"/>
    <circle cx="120" cy="356" r="22" fill="#2f9e44"/>
    <text x="120" y="364" text-anchor="middle" class="num">4</text>
    <text x="160" y="352" class="step">Verify each reconnects before the next</text>
    <text x="160" y="374" class="ex">A half-rotated platform is worse than an un-rotated one. Better still: a dual-credential cutover (no window at all).</text>
    <rect x="760" y="344" width="92" height="24" rx="12" fill="#ffffff" stroke="#2f9e44"/>
    <text x="806" y="360" text-anchor="middle" class="tag" fill="#2f7a37">VERIFY</text>
  </g>

  <!-- Gotcha -->
  <rect x="84" y="404" width="786" height="48" rx="10" fill="#fff4e0" stroke="#f3c677"/>
  <text x="104" y="424" class="gh">GOTCHA &#8212; env_file eats a lone &#36;</text>
  <text x="104" y="442" class="mono">DB_PASSWORD=ab&#36;cd1234  &#8594;  container gets ab1234   &#8226;   escape it: ab&#36;&#36;cd1234</text>

  <text x="450" y="480" text-anchor="middle" class="foot">Leaked = live until changed. Rotate first, investigate second.</text>
</svg>
