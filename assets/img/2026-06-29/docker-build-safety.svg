<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 470" width="900" height="470" role="img" aria-label="docker compose build overwrites the running image: patch-then-build loses the uncommitted fix; commit then build, verify, up --no-build deploys exactly what you verified">
  <style>
    text{font-family:'Segoe UI',Roboto,'Helvetica Neue',Arial,sans-serif}
    .title{font-size:23px;font-weight:700;fill:#1f2933}
    .sub{font-size:13.5px;fill:#52606d}
    .ph{font-size:15px;font-weight:700}
    .chip{font-size:12.5px;fill:#1f2933}
    .mono{font-family:'SFMono-Regular',Consolas,'Liberation Mono',monospace;font-size:11.5px;fill:#1f2933}
    .end{font-size:13px;font-weight:700}
    .foot{font-size:13px;fill:#3e4c59}
  </style>
  <rect width="900" height="470" fill="#ffffff"/>
  <text x="30" y="40" class="title">Commit before you rebuild</text>
  <text x="30" y="64" class="sub">&#96;docker compose build&#96; overwrites the running image from the context on disk &#8212; an in-container patch is gone.</text>

  <defs>
    <marker id="ar" markerWidth="9" markerHeight="9" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 z" fill="#cf8a8a"/></marker>
    <marker id="ag" markerWidth="9" markerHeight="9" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 z" fill="#8cc6a3"/></marker>
  </defs>

  <!-- LEFT: patch then build -->
  <rect x="24" y="86" width="412" height="306" rx="12" fill="#fbeaea" stroke="#e3a3a3"/>
  <text x="44" y="114" class="ph" fill="#b02a2a">&#10007; Patch in-container, then build</text>

  <rect x="44" y="128" width="372" height="44" rx="8" fill="#ffffff" stroke="#e3a3a3"/>
  <text x="58" y="148" class="chip">Hotfix live in the running container</text>
  <text x="58" y="165" class="mono" fill="#7b8794">edit app.py &#183; pip install &#8212; never on disk</text>

  <path d="M230 172 L230 186" fill="none" stroke="#cf8a8a" stroke-width="1.8" marker-end="url(#ar)"/>

  <rect x="44" y="190" width="372" height="44" rx="8" fill="#ffffff" stroke="#e3a3a3"/>
  <text x="58" y="210" class="chip">&#96;compose build&#96; reads disk, not the container</text>
  <text x="58" y="227" class="mono" fill="#7b8794">fresh image from original app.py</text>

  <path d="M230 234 L230 248" fill="none" stroke="#cf8a8a" stroke-width="1.8" marker-end="url(#ar)"/>

  <rect x="44" y="252" width="372" height="44" rx="8" fill="#ffffff" stroke="#e3a3a3"/>
  <text x="58" y="272" class="chip">New image overwrites the running tag</text>
  <text x="58" y="289" class="mono" fill="#7b8794">up --force-recreate &#8594; patch destroyed</text>

  <path d="M230 296 L230 310" fill="none" stroke="#cf8a8a" stroke-width="1.8" marker-end="url(#ar)"/>

  <rect x="44" y="314" width="372" height="32" rx="8" fill="#ffecec" stroke="#d64545"/>
  <text x="230" y="335" text-anchor="middle" class="end" fill="#b02a2a">outage &#183; nothing to roll back to</text>

  <text x="230" y="372" text-anchor="middle" class="sub" fill="#b02a2a">Code that isn&#8217;t committed doesn&#8217;t exist.</text>

  <!-- RIGHT: commit then build, verify, up no-build -->
  <rect x="464" y="86" width="412" height="306" rx="12" fill="#e9f7ee" stroke="#a6dcb8"/>
  <text x="484" y="114" class="ph" fill="#2f7a37">&#10003; Commit &#8594; build &#8594; verify &#8594; up</text>

  <rect x="484" y="128" width="372" height="44" rx="8" fill="#ffffff" stroke="#a6dcb8"/>
  <text x="498" y="148" class="chip">1 &#183; Commit what&#8217;s on disk first</text>
  <text x="498" y="165" class="mono" fill="#52606d">git add -p &amp;&amp; git commit -m &#34;fix: ...&#34;</text>

  <path d="M670 172 L670 186" fill="none" stroke="#8cc6a3" stroke-width="1.8" marker-end="url(#ag)"/>

  <rect x="484" y="190" width="372" height="44" rx="8" fill="#ffffff" stroke="#a6dcb8"/>
  <text x="498" y="210" class="chip">2 &#183; Build clean so no stale layer hides it</text>
  <text x="498" y="227" class="mono" fill="#52606d">docker compose build --no-cache &lt;svc&gt;</text>

  <path d="M670 234 L670 248" fill="none" stroke="#8cc6a3" stroke-width="1.8" marker-end="url(#ag)"/>

  <rect x="484" y="252" width="372" height="44" rx="8" fill="#ffffff" stroke="#a6dcb8"/>
  <text x="498" y="272" class="chip">3 &#183; Verify the image before touching prod</text>
  <text x="498" y="289" class="mono" fill="#52606d">docker run --rm img grep fix_marker app.py</text>

  <path d="M670 296 L670 310" fill="none" stroke="#8cc6a3" stroke-width="1.8" marker-end="url(#ag)"/>

  <rect x="484" y="314" width="372" height="32" rx="8" fill="#eafaf0" stroke="#2f9e44"/>
  <text x="670" y="335" text-anchor="middle" class="end" fill="#2f7a37">4 &#183; up -d --no-build &#8212; deploy what you verified</text>

  <text x="670" y="372" text-anchor="middle" class="sub" fill="#2f7a37">&#96;--no-build&#96; fails loudly if the image is missing.</text>

  <!-- footer band -->
  <rect x="30" y="408" width="840" height="42" rx="8" fill="#fff4e0" stroke="#f3c677"/>
  <text x="450" y="425" text-anchor="middle" class="foot" fill="#9a5b00">&#9888;  Compose &#8805; 2.37: a literal &#36; in &#46;env starts a substitution &#8212; escape passwords as &#36;&#36; or they go empty.</text>
  <text x="450" y="442" text-anchor="middle" class="foot" fill="#9a5b00">Build discipline is how you avoid fixing the same problem twice.</text>
</svg>
