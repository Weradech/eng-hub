<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 470" width="900" height="470" role="img" aria-label="Sizing a PCB from Gerber files: parse the outline layer, extract the bounding box, compute area, apply panel yield, then divide panel price by boards-per-panel for unit cost. FR-4 and aluminium differ 2 to 3 times on substrate and are identified differently. Quoting from assumed size instead of the parsed outline caused a 2.5 times error">
  <style>
    text{font-family:'Segoe UI',Roboto,'Helvetica Neue',Arial,sans-serif}
    .title{font-size:23px;font-weight:700;fill:#1f2933}
    .sub{font-size:13.5px;fill:#52606d}
    .nm{font-size:12.5px;font-weight:700;fill:#1f2933}
    .det{font-size:10.5px;fill:#52606d}
    .ph{font-size:14px;font-weight:700}
    .k{font-size:10px;font-weight:700;letter-spacing:.5px;fill:#7b8794}
    .v{font-size:12px;fill:#1f2933}
    .warn{font-size:12.5px;fill:#7a2c22}
    .foot{font-size:13px;fill:#3e4c59}
  </style>
  <rect width="900" height="470" fill="#ffffff"/>
  <text x="30" y="40" class="title">Sizing a PCB from Gerber: FR-4 vs Aluminium</text>
  <text x="30" y="64" class="sub">Parse the outline layer, compute area, apply panel yield, divide panel price by boards-per-panel &#8212; or mis-quote by 2.5&#215;.</text>

  <defs>
    <marker id="ga" markerWidth="9" markerHeight="9" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 z" fill="#5fa1de"/></marker>
  </defs>

  <!-- workflow -->
  <g>
    <rect x="24"  y="92" width="160" height="66" rx="10" fill="#e7f1fb" stroke="#9ec5f0"/>
    <text x="104" y="120" text-anchor="middle" class="nm">Outline layer</text>
    <text x="104" y="139" text-anchor="middle" class="det">.GKO / _G1 / .GM1</text>

    <rect x="196" y="92" width="160" height="66" rx="10" fill="#e7f1fb" stroke="#9ec5f0"/>
    <text x="276" y="120" text-anchor="middle" class="nm">Bounding box</text>
    <text x="276" y="139" text-anchor="middle" class="det">X &#215; Y extents</text>

    <rect x="368" y="92" width="160" height="66" rx="10" fill="#e7f1fb" stroke="#9ec5f0"/>
    <text x="448" y="120" text-anchor="middle" class="nm">Board area</text>
    <text x="448" y="139" text-anchor="middle" class="det">mm&#178;</text>

    <rect x="540" y="92" width="160" height="66" rx="10" fill="#e7f1fb" stroke="#9ec5f0"/>
    <text x="620" y="120" text-anchor="middle" class="nm">Panel yield</text>
    <text x="620" y="139" text-anchor="middle" class="det">boards / panel</text>

    <rect x="712" y="92" width="160" height="66" rx="10" fill="#e6f4ea" stroke="#9ed6ad"/>
    <text x="792" y="120" text-anchor="middle" class="nm">Unit cost</text>
    <text x="792" y="139" text-anchor="middle" class="det">panel &#247; boards</text>
  </g>
  <line x1="184" y1="125" x2="196" y2="125" stroke="#5fa1de" stroke-width="2" marker-end="url(#ga)"/>
  <line x1="356" y1="125" x2="368" y2="125" stroke="#5fa1de" stroke-width="2" marker-end="url(#ga)"/>
  <line x1="528" y1="125" x2="540" y2="125" stroke="#5fa1de" stroke-width="2" marker-end="url(#ga)"/>
  <line x1="700" y1="125" x2="712" y2="125" stroke="#5fa1de" stroke-width="2" marker-end="url(#ga)"/>

  <!-- FR-4 vs Aluminium -->
  <rect x="24" y="184" width="514" height="214" rx="12" fill="#fafbfc" stroke="#cbd2d9"/>
  <text x="44" y="211" class="ph" fill="#1f2933">FR-4 vs Aluminium</text>
  <text x="206" y="211" class="ph" fill="#1c5fa8">FR-4</text>
  <text x="392" y="211" class="ph" fill="#9e6b00">Aluminium</text>

  <text x="44" y="248" class="k">SUBSTRATE COST</text>
  <text x="206" y="248" class="v">baseline (1&#215;)</text>
  <text x="392" y="248" class="v">2&#8211;3&#215; higher</text>

  <text x="44" y="288" class="k">TYPICAL STACK-UP</text>
  <text x="206" y="288" class="v">multilayer</text>
  <text x="392" y="288" class="v">single-layer MCPCB</text>

  <text x="44" y="328" class="k">IDENTIFY BY</text>
  <text x="206" y="328" class="v">copper + drill</text>
  <text x="392" y="328" class="v">IMS / dielectric</text>

  <text x="44" y="372" class="det">Wrong substrate assumption breaks the price before a single component is added.</text>

  <!-- K3VG warning -->
  <rect x="552" y="184" width="324" height="214" rx="12" fill="#fdecea" stroke="#e8a79c"/>
  <text x="572" y="211" class="ph" fill="#b03a2e">The K3VG lesson</text>
  <text x="572" y="244" class="warn" font-weight="700" font-size="26">2.5&#215; error</text>
  <text x="572" y="278" class="warn">Quoted from an assumed board</text>
  <text x="572" y="297" class="warn">size instead of the parsed outline.</text>
  <text x="572" y="332" class="warn">Fix: size from the Gerber,</text>
  <text x="572" y="351" class="warn">never the eyeball.</text>

  <text x="30" y="436" class="foot">The outline layer is the single source of truth for board area &#8212; everything downstream multiplies its error.</text>
</svg>
