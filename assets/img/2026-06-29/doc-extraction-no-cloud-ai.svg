<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 470" width="900" height="470" role="img" aria-label="Document extraction pipeline: text layer first, OCR only for scans, anchored extraction, then cross-reference doc IDs">
  <style>
    text{font-family:'Segoe UI',Roboto,'Helvetica Neue',Arial,sans-serif}
    .title{font-size:23px;font-weight:700;fill:#1f2933}
    .sub{font-size:13.5px;fill:#52606d}
    .bx{font-size:13px;font-weight:700;fill:#1f2933}
    .bxs{font-size:11.5px;fill:#52606d}
    .wh{font-size:13px;font-weight:700;fill:#ffffff}
    .lbl{font-size:11px;font-weight:700;letter-spacing:.5px}
    .note{font-size:12px;fill:#52606d}
    .foot{font-size:13px;fill:#3e4c59}
  </style>
  <rect width="900" height="470" fill="#ffffff"/>
  <text x="30" y="40" class="title">Document extraction without cloud AI</text>
  <text x="30" y="64" class="sub">Text-layer first, OCR only for scans, anchored fields not fuzzy matching &#8212; cheap, deterministic, on-prem.</text>

  <defs>
    <marker id="ga" markerWidth="9" markerHeight="9" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 z" fill="#7b8794"/></marker>
    <marker id="gg" markerWidth="9" markerHeight="9" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 z" fill="#2f9e44"/></marker>
    <marker id="go" markerWidth="9" markerHeight="9" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 z" fill="#d9760a"/></marker>
  </defs>

  <!-- PDF -->
  <rect x="30" y="150" width="110" height="60" rx="10" fill="#2b3a4a"/>
  <text x="85" y="176" text-anchor="middle" class="wh">Supplier</text>
  <text x="85" y="194" text-anchor="middle" class="wh">PDF</text>
  <path d="M140 180 L172 180" fill="none" stroke="#7b8794" stroke-width="2" marker-end="url(#ga)"/>

  <!-- decision -->
  <rect x="176" y="150" width="122" height="60" rx="10" fill="#fff4e0" stroke="#f3c677"/>
  <text x="237" y="176" text-anchor="middle" class="bx" fill="#9a5b00">text layer?</text>
  <text x="237" y="194" text-anchor="middle" class="bxs">embedded text</text>

  <!-- YES -> pdfplumber -->
  <path d="M298 168 C322 156, 330 130, 348 124" fill="none" stroke="#2f9e44" stroke-width="2" marker-end="url(#gg)"/>
  <text x="312" y="138" class="lbl" fill="#2f7a37">YES</text>
  <rect x="350" y="96" width="240" height="54" rx="10" fill="#e9f7ee" stroke="#a6dcb8"/>
  <text x="470" y="120" text-anchor="middle" class="bx">pdfplumber</text>
  <text x="470" y="138" text-anchor="middle" class="bxs">embedded text + coordinates</text>

  <!-- NO -> Tesseract -->
  <path d="M298 192 C322 206, 330 234, 348 240" fill="none" stroke="#d9760a" stroke-width="2" marker-end="url(#go)"/>
  <text x="312" y="232" class="lbl" fill="#9a5b00">NO</text>
  <rect x="350" y="214" width="240" height="54" rx="10" fill="#fff4e0" stroke="#f3c677"/>
  <text x="470" y="238" text-anchor="middle" class="bx" fill="#9a5b00">render &#8594; Tesseract OCR</text>
  <text x="470" y="256" text-anchor="middle" class="bxs">scanned / image-only pages</text>

  <!-- merge into anchored -->
  <path d="M590 124 C612 132, 614 158, 626 170" fill="none" stroke="#7b8794" stroke-width="2" marker-end="url(#ga)"/>
  <path d="M590 240 C612 232, 614 206, 626 194" fill="none" stroke="#7b8794" stroke-width="2" marker-end="url(#ga)"/>
  <rect x="628" y="150" width="242" height="60" rx="10" fill="#e7f1fb" stroke="#9ec5f0"/>
  <text x="749" y="176" text-anchor="middle" class="bx" fill="#1c5fa8">Anchored extraction</text>
  <text x="749" y="194" text-anchor="middle" class="bxs">by label / column position</text>

  <!-- down to cross-ref -->
  <path d="M749 210 L749 296" fill="none" stroke="#2f9e44" stroke-width="2" marker-end="url(#gg)"/>
  <rect x="560" y="300" width="380" height="58" rx="10" fill="#e9f7ee" stroke="#a6dcb8"/>
  <text x="750" y="324" text-anchor="middle" class="bx" fill="#2f7a37">Cross-ref doc IDs</text>
  <text x="750" y="344" text-anchor="middle" class="bxs">PO &#183; GR &#183; invoice &#183; DO &#8594; into the existing chain</text>

  <!-- LLM note -->
  <rect x="30" y="300" width="300" height="58" rx="10" fill="#f5f7fa" stroke="#cbd2d9" stroke-dasharray="5 4"/>
  <text x="48" y="324" class="bx" fill="#52606d">LLM only for the messy tail</text>
  <text x="48" y="344" class="bxs">handwritten / free-form &#8212; the residual</text>

  <rect x="30" y="392" width="840" height="32" rx="8" fill="#e7f1fb" stroke="#9ec5f0"/>
  <text x="450" y="413" text-anchor="middle" class="foot">Don&#8217;t pay cloud-AI prices for documents a regex-with-coordinates would nail.</text>
</svg>
