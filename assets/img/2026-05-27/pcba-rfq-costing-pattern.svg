<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 470" width="900" height="470" role="img" aria-label="PCBA RFQ cost build-up: material plus assembly, times 1.15 overhead, divided by one minus margin, gives the unit price; NRE is a separate lump-sum line in the quotation">
  <style>
    text{font-family:'Segoe UI',Roboto,'Helvetica Neue',Arial,sans-serif}
    .title{font-size:23px;font-weight:700;fill:#1f2933}
    .sub{font-size:13.5px;fill:#52606d}
    .stepn{font-size:11px;font-weight:800;letter-spacing:.5px;fill:#ffffff}
    .bx{font-size:13.5px;font-weight:700;fill:#1f2933}
    .bxs{font-size:11.5px;fill:#52606d}
    .val{font-size:15px;font-weight:800;fill:#1f2933}
    .op{font-size:20px;font-weight:800;fill:#7b8794}
    .lbl{font-size:10px;font-weight:700;letter-spacing:.8px}
    .foot{font-size:13px;fill:#3e4c59}
    .mono{font-family:'SFMono-Regular',Consolas,'Liberation Mono',monospace}
  </style>
  <rect width="900" height="470" fill="#ffffff"/>
  <text x="30" y="40" class="title">How a PCBA quote is built &#8212; and what stays hidden</text>
  <text x="30" y="64" class="sub">Stack manufacturing cost, mark up 15% OH, divide by margin &#8212; then quote a lump sum. NRE rides separately.</text>

  <defs>
    <marker id="ga" markerWidth="9" markerHeight="9" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 z" fill="#7b8794"/></marker>
    <marker id="gb" markerWidth="9" markerHeight="9" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 z" fill="#1c7ed6"/></marker>
  </defs>

  <!-- ===== Top build-up row: Material + Assembly = Mfg cost ===== -->
  <!-- Material (BOM) -->
  <rect x="30" y="100" width="178" height="84" rx="10" fill="#e7f1fb" stroke="#9ec5f0"/>
  <rect x="30" y="100" width="178" height="22" rx="10" fill="#1c7ed6"/>
  <rect x="30" y="111" width="178" height="11" fill="#1c7ed6"/>
  <text x="42" y="116" class="stepn">1 &#183; MATERIAL (BOM)</text>
  <text x="42" y="146" class="bxs">MOQ-adjusted &#183; drop DNI</text>
  <text x="42" y="162" class="bxs">bare board = own line</text>
  <text x="198" y="180" text-anchor="end" class="val">&#3647;94.82</text>

  <text x="222" y="148" text-anchor="middle" class="op">+</text>

  <!-- Assembly -->
  <rect x="236" y="100" width="178" height="84" rx="10" fill="#e7f1fb" stroke="#9ec5f0"/>
  <rect x="236" y="100" width="178" height="22" rx="10" fill="#1c7ed6"/>
  <rect x="236" y="111" width="178" height="11" fill="#1c7ed6"/>
  <text x="248" y="116" class="stepn">2 &#183; ASSEMBLY + LABOUR</text>
  <text x="248" y="146" class="bxs">placements &#215; rate</text>
  <text x="248" y="162" class="bxs">+ machine setup / lot</text>
  <text x="404" y="180" text-anchor="end" class="val">&#3647;28.46</text>

  <text x="428" y="148" text-anchor="middle" class="op">=</text>

  <!-- Manufacturing cost subtotal -->
  <rect x="442" y="100" width="172" height="84" rx="10" fill="#f5f7fa" stroke="#cbd2d9"/>
  <text x="528" y="124" text-anchor="middle" class="lbl" fill="#7b8794">MANUFACTURING COST</text>
  <text x="528" y="156" text-anchor="middle" class="val">&#3647;123.28</text>
  <text x="528" y="174" text-anchor="middle" class="bxs">the only base OH touches</text>

  <!-- ===== OH multiplier ===== -->
  <path d="M614 142 L656 142" fill="none" stroke="#1c7ed6" stroke-width="2.5" marker-end="url(#gb)"/>
  <rect x="660" y="100" width="210" height="84" rx="10" fill="#fff4e0" stroke="#f3c677"/>
  <rect x="660" y="100" width="210" height="22" rx="10" fill="#f08c00"/>
  <rect x="660" y="111" width="210" height="11" fill="#f08c00"/>
  <text x="672" y="116" class="stepn">3 &#183; OVERHEAD</text>
  <text x="672" y="146" class="bx" fill="#9a5b00"><tspan class="mono">&#215; 1.15</tspan>  (OH = 15%)</text>
  <text x="672" y="164" class="bxs" fill="#9a5b00">&#9888; on mfg cost only &#8212; never on NRE</text>
  <text x="858" y="180" text-anchor="end" class="val" fill="#9a5b00">&#3647;141.77</text>

  <!-- down arrow from OH to margin -->
  <path d="M765 184 L765 222" fill="none" stroke="#7b8794" stroke-width="2" marker-end="url(#ga)"/>

  <!-- ===== Margin divisor -> Unit price ===== -->
  <rect x="660" y="226" width="210" height="84" rx="10" fill="#e9f7ee" stroke="#a6dcb8"/>
  <rect x="660" y="226" width="210" height="22" rx="10" fill="#2f9e44"/>
  <rect x="660" y="237" width="210" height="11" fill="#2f9e44"/>
  <text x="672" y="242" class="stepn">5 &#183; MARGIN</text>
  <text x="672" y="272" class="bx" fill="#2f7a37"><tspan class="mono">&#247; (1 &#8722; 25%)</tspan></text>
  <text x="672" y="290" class="bxs" fill="#2f7a37">proto 25&#8211;35% &#183; mass 15&#8211;20%</text>
  <text x="858" y="306" text-anchor="end" class="val" fill="#2f7a37">&#8776; &#3647;190</text>

  <!-- arrow margin -> unit price -->
  <path d="M660 268 L612 268" fill="none" stroke="#2f9e44" stroke-width="2.5" marker-end="url(#gb)"/>

  <!-- Unit price node -->
  <rect x="412" y="226" width="196" height="84" rx="10" fill="#2b3a4a"/>
  <text x="510" y="252" text-anchor="middle" class="lbl" fill="#9aa5b1">UNIT PRICE / BOARD</text>
  <text x="510" y="284" text-anchor="middle" class="val" fill="#ffffff" font-size="22">&#3647;190.00</text>
  <text x="510" y="302" text-anchor="middle" class="bxs" fill="#cbd2d9">recurring &#183; per piece</text>

  <!-- ===== NRE separate lump-sum line ===== -->
  <rect x="30" y="226" width="356" height="84" rx="10" fill="#f5f7fa" stroke="#cbd2d9" stroke-dasharray="5 4"/>
  <rect x="30" y="226" width="356" height="22" rx="10" fill="#52606d"/>
  <rect x="30" y="237" width="356" height="11" fill="#52606d"/>
  <text x="42" y="242" class="stepn">4 &#183; NRE (NON-RECURRING ENGINEERING)</text>
  <text x="42" y="272" class="bxs">stencil &#183; ICT/FCT fixture &#183; jigs &#183; eng hours</text>
  <text x="42" y="290" class="bx" fill="#52606d">stays a separate quote line &#8212; one-time</text>
  <text x="376" y="306" text-anchor="end" class="val" fill="#52606d">&#3647;5,500</text>

  <!-- ===== Bottom: the quotation the customer sees ===== -->
  <rect x="30" y="334" width="840" height="86" rx="12" fill="#e7f1fb" stroke="#9ec5f0"/>
  <text x="48" y="358" class="lbl" fill="#1c5fa8">6 &#183; WHAT THE CUSTOMER SEES &#8212; LUMP SUM ONLY</text>
  <text x="48" y="386" class="bx" fill="#1c5fa8"><tspan class="mono">Unit Price &#3647;190.00 / board</tspan></text>
  <text x="48" y="408" class="bx" fill="#1c5fa8"><tspan class="mono">NRE &#3647;5,500 (one-time) &#183; MOQ &#183; Lead time &#183; Validity 30d</tspan></text>
  <rect x="556" y="350" width="298" height="58" rx="9" fill="#ffffff" stroke="#9ec5f0"/>
  <text x="705" y="372" text-anchor="middle" class="lbl" fill="#b02a2a">&#10007; NEVER EXPOSE</text>
  <text x="705" y="396" text-anchor="middle" class="bx" fill="#1f2933">OH % &#183; margin % &#183; cost breakdown</text>

  <text x="450" y="448" text-anchor="middle" class="foot">Final Price = [(Material + Assembly) &#215; 1.15] &#247; (1 &#8722; Margin%) + NRE/lot &#8212; show the price, hide the build.</text>
</svg>
