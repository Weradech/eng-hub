<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 470" width="900" height="470" role="img" aria-label="The reflex jumps straight to a fix; the discipline gathers symptoms, distrusts the convenient hypothesis, verifies the end state, makes the fix auditable, and states the blast radius first">
  <style>
    text{font-family:'Segoe UI',Roboto,'Helvetica Neue',Arial,sans-serif}
    .title{font-size:23px;font-weight:700;fill:#1f2933}
    .sub{font-size:13.5px;fill:#52606d}
    .ph{font-size:15px;font-weight:700}
    .reflex{font-size:13px;fill:#1f2933}
    .num{font-size:13px;font-weight:800;fill:#ffffff}
    .step{font-size:12.5px;font-weight:700;fill:#1f2933}
    .ex{font-size:11px;fill:#52606d}
    .lbl{font-size:10px;font-weight:700;letter-spacing:1px}
    .foot{font-size:13px;fill:#3e4c59}
  </style>
  <rect width="900" height="470" fill="#ffffff"/>
  <text x="30" y="40" class="title">RCA: gather symptoms before you touch the keyboard</text>
  <text x="30" y="64" class="sub">A code change feels free, so the urge to &#8220;just try a fix&#8221; is strong. The cheapest fix to imagine is rarely the cause.</text>

  <!-- LEFT: the reflex -->
  <rect x="30" y="86" width="300" height="350" rx="12" fill="#fbeaea" stroke="#e3a3a3"/>
  <path d="M30 98 a12 12 0 0 1 12 -12 h276 a12 12 0 0 1 12 12 v22 h-300 z" fill="#2b3a4a"/>
  <text x="48" y="114" class="ph" fill="#ffffff">&#10007; The reflex</text>

  <text x="48" y="150" class="lbl" fill="#b02a2a">SYMPTOM APPEARS</text>
  <text x="48" y="172" class="reflex">Stock is off by &#8722;648. A column</text>
  <text x="48" y="188" class="reflex">is missing. A table went to zero.</text>

  <rect x="48" y="206" width="264" height="62" rx="8" fill="#ffffff" stroke="#e3a3a3"/>
  <text x="180" y="230" text-anchor="middle" class="reflex" fill="#b02a2a">&#8220;It&#8217;s the feature we just</text>
  <text x="180" y="248" text-anchor="middle" class="reflex" fill="#b02a2a">shipped &#8212; roll it back.&#8221;</text>

  <text x="180" y="290" text-anchor="middle" class="ex">a hypothesis dressed up as a fact</text>

  <line x1="180" y1="300" x2="180" y2="324" stroke="#d64545" stroke-width="2" marker-end="url(#redarrow)"/>

  <rect x="48" y="332" width="264" height="76" rx="8" fill="#ffecec" stroke="#d64545"/>
  <text x="180" y="356" text-anchor="middle" class="step" fill="#b02a2a">Touch the keyboard first</text>
  <text x="180" y="378" text-anchor="middle" class="ex" fill="#a61b1b">A second incident shipped, and the</text>
  <text x="180" y="392" text-anchor="middle" class="ex" fill="#a61b1b">&#8722;648 is still sitting there.</text>

  <!-- RIGHT: the discipline -->
  <rect x="354" y="86" width="516" height="350" rx="12" fill="#e9f7ee" stroke="#a6dcb8"/>
  <path d="M354 98 a12 12 0 0 1 12 -12 h492 a12 12 0 0 1 12 12 v22 h-516 z" fill="#2b3a4a"/>
  <text x="372" y="114" class="ph" fill="#ffffff">&#10003; The discipline &#8212; the portable checklist</text>

  <!-- Step 1 -->
  <circle cx="388" cy="152" r="13" fill="#2f9e44"/>
  <text x="388" y="157" text-anchor="middle" class="num">1</text>
  <text x="412" y="148" class="step">Capture symptoms first</text>
  <text x="412" y="166" class="ex">timestamps, actor / source, reproducibility &#8212; before proposing a cause</text>

  <!-- Step 2 -->
  <circle cx="388" cy="206" r="13" fill="#2f9e44"/>
  <text x="388" y="211" text-anchor="middle" class="num">2</text>
  <text x="412" y="202" class="step">Distrust the convenient hypothesis</text>
  <text x="412" y="220" class="ex">&#8220;it&#8217;s the new feature&#8221; is the thing you touched most recently, not the cause</text>

  <!-- Step 3 -->
  <circle cx="388" cy="260" r="13" fill="#2f9e44"/>
  <text x="388" y="265" text-anchor="middle" class="num">3</text>
  <text x="412" y="256" class="step">Verify the end state, not the log</text>
  <text x="412" y="274" class="ex">count the rows that moved, query the table &#8212; a green log is a claim, not evidence</text>

  <!-- Step 4 -->
  <circle cx="388" cy="314" r="13" fill="#2f9e44"/>
  <text x="388" y="319" text-anchor="middle" class="num">4</text>
  <text x="412" y="310" class="step">Make the fix auditable</text>
  <text x="412" y="328" class="ex">a corrective movement with a note beats a silent edit you can&#8217;t explain later</text>

  <!-- Step 5 -->
  <circle cx="388" cy="368" r="13" fill="#f08c00"/>
  <text x="388" y="373" text-anchor="middle" class="num">5</text>
  <text x="412" y="364" class="step">State the blast radius before destructive actions</text>
  <text x="412" y="382" class="ex" fill="#9a5b00">N rows, snapshot taken, undo ready &#8212; a broad direction is not a scope</text>

  <line x1="372" y1="400" x2="852" y2="400" stroke="#a6dcb8" stroke-width="1"/>
  <text x="612" y="420" text-anchor="middle" class="ex" fill="#2f7a37">Buck converter or database, the loop is the same.</text>

  <defs>
    <marker id="redarrow" markerWidth="9" markerHeight="9" refX="5" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 z" fill="#d64545"/></marker>
  </defs>

  <rect x="30" y="444" width="840" height="0.1" fill="none"/>
  <text x="450" y="458" text-anchor="middle" class="foot">RCA isn&#8217;t a hardware skill or a software skill &#8212; it&#8217;s the refusal to guess before you&#8217;ve looked.</text>
</svg>
