<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 470" width="900" height="470" role="img" aria-label="ICT assessment pipeline from NPI stage: review Gerber, count test points and coverage, score nine DFT criteria, then branch on the score to full ICT, limited ICT, or FVT/AOI instead">
  <style>
    text{font-family:'Segoe UI',Roboto,'Helvetica Neue',Arial,sans-serif}
    .title{font-size:23px;font-weight:700;fill:#1f2933}
    .sub{font-size:13.5px;fill:#52606d}
    .wh{font-size:13px;font-weight:700;fill:#ffffff}
    .whs{font-size:11px;fill:#cbd2d9}
    .bx{font-size:13px;font-weight:700;fill:#1f2933}
    .bxs{font-size:11px;fill:#52606d}
    .lbl{font-size:10px;font-weight:700;letter-spacing:.8px}
    .gate{font-size:12px;font-weight:800}
    .foot{font-size:13px;fill:#3e4c59}
  </style>
  <rect width="900" height="470" fill="#ffffff"/>
  <text x="30" y="40" class="title">Does In-Circuit Test fit? Decide it at NPI.</text>
  <text x="30" y="64" class="sub">Score the layout while changes are still free &#8212; coverage and 9 DFT criteria pick the test strategy.</text>

  <defs>
    <marker id="ga" markerWidth="9" markerHeight="9" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 z" fill="#7b8794"/></marker>
    <marker id="gg" markerWidth="9" markerHeight="9" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 z" fill="#2f9e44"/></marker>
    <marker id="go" markerWidth="9" markerHeight="9" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 z" fill="#d9760a"/></marker>
    <marker id="gr" markerWidth="9" markerHeight="9" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 z" fill="#d64545"/></marker>
  </defs>

  <!-- NPI stage band -->
  <rect x="30" y="92" width="40" height="186" rx="8" fill="#2b3a4a"/>
  <text x="50" y="185" transform="rotate(-90 50 185)" text-anchor="middle" class="lbl" fill="#ffffff">NPI STAGE</text>

  <!-- Step 1: Review files -->
  <rect x="84" y="100" width="170" height="74" rx="10" fill="#e7f1fb" stroke="#9ec5f0"/>
  <text x="100" y="124" class="lbl" fill="#1c7ed6">1 &#183; REVIEW FILES</text>
  <text x="100" y="144" class="bx" fill="#1c5fa8">Gerber / ODB++</text>
  <text x="100" y="162" class="bxs">+ BOM &#183; schematic &#183; assembly</text>
  <path d="M254 137 L284 137" fill="none" stroke="#7b8794" stroke-width="2" marker-end="url(#ga)"/>

  <!-- Step 2: Count TP + coverage -->
  <rect x="288" y="100" width="186" height="74" rx="10" fill="#e7f1fb" stroke="#9ec5f0"/>
  <text x="304" y="124" class="lbl" fill="#1c7ed6">2 &#183; COUNT TP / VIA</text>
  <text x="304" y="144" class="bx" fill="#1c5fa8">Coverage = TP / nodes</text>
  <text x="304" y="162" class="bxs">target &#8805; 85% node coverage</text>
  <path d="M474 137 L504 137" fill="none" stroke="#7b8794" stroke-width="2" marker-end="url(#ga)"/>

  <!-- Step 3: 9 DFT criteria -->
  <rect x="508" y="100" width="200" height="74" rx="10" fill="#fff4e0" stroke="#f3c677"/>
  <text x="524" y="124" class="lbl" fill="#9a5b00">3 &#183; SCORE 9 DFT CRITERIA</text>
  <text x="524" y="144" class="bx" fill="#9a5b00">pad &#216; &#183; pitch &#183; clearance</text>
  <text x="524" y="162" class="bxs">rails &#183; vias &#183; crystal &#183; JTAG</text>

  <!-- gate node -->
  <path d="M708 137 L738 137" fill="none" stroke="#7b8794" stroke-width="2" marker-end="url(#ga)"/>
  <circle cx="772" cy="137" r="30" fill="#2b3a4a"/>
  <text x="772" y="133" text-anchor="middle" class="wh">DFT</text>
  <text x="772" y="149" text-anchor="middle" class="whs">score?</text>

  <!-- branch arrows from gate down to three outcomes -->
  <path d="M758 162 C700 196, 320 200, 220 230" fill="none" stroke="#2f9e44" stroke-width="2" marker-end="url(#gg)"/>
  <text x="392" y="200" class="gate" fill="#2f7a37">9 / 9</text>
  <path d="M772 167 L772 230" fill="none" stroke="#d9760a" stroke-width="2" marker-end="url(#go)"/>
  <text x="724" y="202" class="gate" fill="#d9760a">6 &#8211; 8 pass</text>
  <path d="M772 167 C610 200, 360 200, 270 230" fill="none" stroke="#d64545" stroke-width="2" marker-end="url(#gr)" opacity="0"/>

  <!-- Outcome A: Full ICT (green, left) -->
  <rect x="40" y="234" width="262" height="92" rx="12" fill="#e9f7ee" stroke="#a6dcb8"/>
  <text x="58" y="259" class="bx" fill="#2f7a37">&#10003; Full ICT capable</text>
  <text x="58" y="280" class="bxs">9/9 pass &#183; build the fixture.</text>
  <text x="58" y="300" class="bxs">High coverage, every fault class</text>
  <text x="58" y="316" class="bxs">caught in-circuit.</text>

  <!-- Outcome B: Limited ICT (orange, middle) -->
  <rect x="318" y="234" width="262" height="92" rx="12" fill="#fff4e0" stroke="#f3c677"/>
  <text x="336" y="259" class="bx" fill="#9a5b00">&#9888; ICT with limited coverage</text>
  <text x="336" y="280" class="bxs">6&#8211;8 pass &#183; ICT viable, but flag</text>
  <text x="336" y="300" class="bxs">the gaps &#8212; e.g. add a crystal</text>
  <text x="336" y="316" class="bxs">bypass DNI, raise an ECR.</text>

  <!-- Outcome C: alternative (red, right) -->
  <rect x="596" y="234" width="264" height="92" rx="12" fill="#fbeaea" stroke="#e3a3a3"/>
  <text x="614" y="259" class="bx" fill="#b02a2a">&#10007; Use FVT or AOI instead</text>
  <text x="614" y="280" class="bxs">&lt; 6 pass &#183; ICT not worth the NRE.</text>
  <text x="614" y="300" class="bxs">Recommend functional / optical</text>
  <text x="614" y="316" class="bxs">test + raise a layout ECR.</text>

  <!-- divider arrow to deliverables row -->
  <path d="M171 326 L171 348" fill="none" stroke="#2f9e44" stroke-width="2" marker-end="url(#gg)"/>
  <path d="M449 326 L449 348" fill="none" stroke="#d9760a" stroke-width="2" marker-end="url(#go)"/>
  <path d="M728 326 L728 348" fill="none" stroke="#d64545" stroke-width="2" marker-end="url(#gr)"/>

  <!-- NRE + Report deliverable band -->
  <rect x="40" y="352" width="820" height="56" rx="10" fill="#f5f7fa" stroke="#cbd2d9"/>
  <text x="58" y="375" class="lbl" fill="#7b8794">4 &#183; NRE ESTIMATE</text>
  <text x="58" y="396" class="bxs">base + (TP &#215; rate) + eng hours &#183; itemized, not lump sum</text>
  <line x1="470" y1="362" x2="470" y2="398" stroke="#cbd2d9" stroke-width="1"/>
  <text x="490" y="375" class="lbl" fill="#7b8794">5 &#183; ASSESSMENT REPORT</text>
  <text x="490" y="396" class="bxs">board overview &#183; TP summary &#183; DFT score &#183; NRE &#183; recommendation</text>

  <rect x="30" y="424" width="840" height="32" rx="8" fill="#e7f1fb" stroke="#9ec5f0"/>
  <text x="450" y="445" text-anchor="middle" class="foot">An ICT fixture is built once &#8212; assess from the Gerber at NPI, while a layout ECR is still free.</text>
</svg>
