<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 470" width="900" height="470" role="img" aria-label="NPI stage-gate pipeline from PoC to Mass Production: each gate is a risk firewall answering one question, and the cost to fix grows tenfold per stage">
  <style>
    text{font-family:'Segoe UI',Roboto,'Helvetica Neue',Arial,sans-serif}
    .title{font-size:23px;font-weight:700;fill:#1f2933}
    .sub{font-size:13.5px;fill:#52606d}
    .stage{font-size:14px;font-weight:700;fill:#ffffff}
    .stsub{font-size:10.5px;fill:#cbd2d9}
    .gq{font-size:11px;font-weight:700;fill:#1c5fa8}
    .gp{font-size:10px;fill:#52606d}
    .glbl{font-size:9.5px;font-weight:700;letter-spacing:1px;fill:#7b8794}
    .cost{font-size:11px;font-weight:700}
    .costlbl{font-size:10px;fill:#7b8794}
    .foot{font-size:13px;fill:#3e4c59}
  </style>
  <rect width="900" height="470" fill="#ffffff"/>
  <text x="30" y="40" class="title">Every NPI gate is a risk firewall, not paperwork</text>
  <text x="30" y="64" class="sub">A gate asks one question &#8212; pass it, or the failure waits downstream where it costs 10&#215; more to fix.</text>

  <defs>
    <marker id="ga" markerWidth="9" markerHeight="9" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 z" fill="#1c7ed6"/></marker>
  </defs>

  <!-- ===== STAGE ROW (5 nodes) ===== -->
  <!-- Stage nodes 130px wide, centered around y=120, gaps for gate diamonds -->

  <!-- PoC -->
  <rect x="30" y="96" width="120" height="56" rx="10" fill="#2b3a4a"/>
  <text x="90" y="120" text-anchor="middle" class="stage">PoC</text>
  <text x="90" y="138" text-anchor="middle" class="stsub">prove the concept</text>

  <!-- EVT -->
  <rect x="222" y="96" width="120" height="56" rx="10" fill="#2b3a4a"/>
  <text x="282" y="120" text-anchor="middle" class="stage">EVT</text>
  <text x="282" y="138" text-anchor="middle" class="stsub">design meets spec</text>

  <!-- DVT -->
  <rect x="414" y="96" width="120" height="56" rx="10" fill="#2b3a4a"/>
  <text x="474" y="120" text-anchor="middle" class="stage">DVT</text>
  <text x="474" y="138" text-anchor="middle" class="stsub">design + process</text>

  <!-- PVT -->
  <rect x="606" y="96" width="120" height="56" rx="10" fill="#2b3a4a"/>
  <text x="666" y="120" text-anchor="middle" class="stage">PVT</text>
  <text x="666" y="138" text-anchor="middle" class="stsub">line hits volume</text>

  <!-- MP -->
  <rect x="798" y="96" width="72" height="56" rx="10" fill="#2f9e44"/>
  <text x="834" y="120" text-anchor="middle" class="stage">MP</text>
  <text x="834" y="138" text-anchor="middle" class="stsub">ramp</text>

  <!-- ===== GATES (diamonds in the 72px gaps between stages) ===== -->
  <!-- Gate centers: x=186, 378, 570, 762 ; y=124 ; arrows flow through -->

  <!-- arrow segments stage->gate->stage -->
  <path d="M150 124 L168 124" fill="none" stroke="#1c7ed6" stroke-width="2" marker-end="url(#ga)"/>
  <path d="M204 124 L222 124" fill="none" stroke="#1c7ed6" stroke-width="2" marker-end="url(#ga)"/>
  <path d="M342 124 L360 124" fill="none" stroke="#1c7ed6" stroke-width="2" marker-end="url(#ga)"/>
  <path d="M396 124 L414 124" fill="none" stroke="#1c7ed6" stroke-width="2" marker-end="url(#ga)"/>
  <path d="M534 124 L552 124" fill="none" stroke="#1c7ed6" stroke-width="2" marker-end="url(#ga)"/>
  <path d="M588 124 L606 124" fill="none" stroke="#1c7ed6" stroke-width="2" marker-end="url(#ga)"/>
  <path d="M726 124 L744 124" fill="none" stroke="#1c7ed6" stroke-width="2" marker-end="url(#ga)"/>
  <path d="M780 124 L798 124" fill="none" stroke="#1c7ed6" stroke-width="2" marker-end="url(#ga)"/>

  <!-- gate diamonds -->
  <rect x="170" y="108" width="32" height="32" rx="5" transform="rotate(45 186 124)" fill="#e7f1fb" stroke="#9ec5f0"/>
  <text x="186" y="128" text-anchor="middle" class="cost" fill="#1c5fa8" font-size="13">1</text>
  <rect x="362" y="108" width="32" height="32" rx="5" transform="rotate(45 378 124)" fill="#e7f1fb" stroke="#9ec5f0"/>
  <text x="378" y="128" text-anchor="middle" class="cost" fill="#1c5fa8" font-size="13">2</text>
  <rect x="554" y="108" width="32" height="32" rx="5" transform="rotate(45 570 124)" fill="#fff4e0" stroke="#f3c677"/>
  <text x="570" y="128" text-anchor="middle" class="cost" fill="#9a5b00" font-size="13">3</text>
  <rect x="746" y="108" width="32" height="32" rx="5" transform="rotate(45 762 124)" fill="#e9f7ee" stroke="#a6dcb8"/>
  <text x="762" y="128" text-anchor="middle" class="cost" fill="#2f7a37" font-size="13">4</text>

  <!-- ===== GATE QUESTION CARDS (under each gate) ===== -->
  <!-- 4 cards, 200px wide, y=176 -->

  <!-- Gate 1: PoC -> EVT -->
  <rect x="30" y="178" width="196" height="92" rx="10" fill="#f5f7fa" stroke="#cbd2d9"/>
  <text x="46" y="198" class="glbl">GATE 1 &#183; PoC &#8594; EVT</text>
  <text x="46" y="216" class="gq">Does the core function work?</text>
  <text x="46" y="236" class="gp">Stops a dead-end idea before</text>
  <text x="46" y="250" class="gp">money goes into real layout.</text>

  <!-- Gate 2: EVT -> DVT -->
  <rect x="244" y="178" width="196" height="92" rx="10" fill="#f5f7fa" stroke="#cbd2d9"/>
  <text x="260" y="198" class="glbl">GATE 2 &#183; EVT &#8594; DVT</text>
  <text x="260" y="216" class="gq">Do all critical specs pass?</text>
  <text x="260" y="236" class="gp">Stops a spec failure before</text>
  <text x="260" y="250" class="gp">tooling cost is committed.</text>

  <!-- Gate 3: DVT -> PVT (the expensive one) -->
  <rect x="458" y="178" width="196" height="92" rx="10" fill="#fff4e0" stroke="#f3c677"/>
  <text x="474" y="198" class="glbl" fill="#9a5b00">GATE 3 &#183; DVT &#8594; PVT</text>
  <text x="474" y="216" class="gq" fill="#9a5b00">Reliable + production-intent?</text>
  <text x="474" y="236" class="gp">Costliest gate to fail &#8212; tooling</text>
  <text x="474" y="250" class="gp">is already paid for.</text>

  <!-- Gate 4: PVT -> MP -->
  <rect x="672" y="178" width="196" height="92" rx="10" fill="#e9f7ee" stroke="#a6dcb8"/>
  <text x="688" y="198" class="glbl" fill="#2f7a37">GATE 4 &#183; PVT &#8594; MP</text>
  <text x="688" y="216" class="gq" fill="#2f7a37">Yield &#8805; target, zero crit. def?</text>
  <text x="688" y="236" class="gp">Stops field failures hiding in</text>
  <text x="688" y="250" class="gp">a &#8220;majority pass&#8221; ramp.</text>

  <!-- ===== COST ESCALATION STRIP ===== -->
  <text x="30" y="312" class="glbl">COST TO FIX THE SAME DEFECT, STAGE BY STAGE</text>
  <rect x="30" y="324" width="838" height="64" rx="10" fill="#ffffff" stroke="#cbd2d9"/>

  <!-- four cost tiers, escalating bar colour -->
  <rect x="44" y="338" width="180" height="36" rx="7" fill="#e7f1fb" stroke="#9ec5f0"/>
  <text x="134" y="356" text-anchor="middle" class="costlbl">Design edit</text>
  <text x="134" y="370" text-anchor="middle" class="cost" fill="#1c5fa8">&#3647;1,000</text>

  <text x="232" y="360" text-anchor="middle" class="cost" fill="#7b8794">&#8594;</text>

  <rect x="244" y="338" width="180" height="36" rx="7" fill="#e7f1fb" stroke="#9ec5f0"/>
  <text x="334" y="356" text-anchor="middle" class="costlbl">EVT &#183; layout respin</text>
  <text x="334" y="370" text-anchor="middle" class="cost" fill="#1c5fa8">&#3647;10,000</text>

  <text x="432" y="360" text-anchor="middle" class="cost" fill="#7b8794">&#8594;</text>

  <rect x="444" y="338" width="180" height="36" rx="7" fill="#fff4e0" stroke="#f3c677"/>
  <text x="534" y="356" text-anchor="middle" class="costlbl">DVT &#183; tooling rework</text>
  <text x="534" y="370" text-anchor="middle" class="cost" fill="#9a5b00">&#3647;100,000</text>

  <text x="632" y="360" text-anchor="middle" class="cost" fill="#7b8794">&#8594;</text>

  <rect x="644" y="338" width="210" height="36" rx="7" fill="#fbeaea" stroke="#e3a3a3"/>
  <text x="749" y="356" text-anchor="middle" class="costlbl">Production &#183; recall / warranty</text>
  <text x="749" y="370" text-anchor="middle" class="cost" fill="#b02a2a">&#3647;1,000,000+</text>

  <!-- ===== FOOTER ===== -->
  <rect x="30" y="404" width="838" height="34" rx="8" fill="#e7f1fb" stroke="#9ec5f0"/>
  <text x="449" y="426" text-anchor="middle" class="foot">A gate caught early is cheap. The same defect found at MP can cost a thousand times more &#8212; that is what each gate buys.</text>
</svg>
