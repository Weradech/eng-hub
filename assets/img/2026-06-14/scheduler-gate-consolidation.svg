<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 470" width="900" height="470" role="img" aria-label="Four background jobs with separate semaphores burst the ERP into connection-refused; one shared gate serializes them for paced, healthy access">
  <style>
    text{font-family:'Segoe UI',Roboto,'Helvetica Neue',Arial,sans-serif}
    .title{font-size:23px;font-weight:700;fill:#1f2933}
    .sub{font-size:13.5px;fill:#52606d}
    .ph{font-size:14.5px;font-weight:700}
    .job{font-size:11.5px;font-weight:700;fill:#1f2933}
    .jobs{font-size:9.5px;fill:#52606d}
    .node{font-size:12.5px;font-weight:700;fill:#ffffff}
    .nodes{font-size:10px;fill:#cbd2d9}
    .lbl{font-size:10px;font-weight:700;letter-spacing:.5px}
    .cap{font-size:11.5px;fill:#52606d}
    .end{font-size:13px;font-weight:700}
    .foot{font-size:13px;fill:#3e4c59}
  </style>
  <rect x="0" y="0" width="900" height="470" fill="#ffffff"/>
  <text x="30" y="40" class="title">Four gates that became one</text>
  <text x="30" y="64" class="sub">Four semaphores guarding the same ERP are four locks that can all be held at once &#8212; not one gate.</text>

  <defs>
    <marker id="ar" markerWidth="9" markerHeight="9" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 z" fill="#d64545"/></marker>
    <marker id="ag" markerWidth="9" markerHeight="9" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 z" fill="#7b8794"/></marker>
    <marker id="agr" markerWidth="9" markerHeight="9" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 z" fill="#2f9e44"/></marker>
  </defs>

  <!-- ================= LEFT: PROBLEM ================= -->
  <rect x="24" y="84" width="420" height="324" rx="12" fill="#fbeaea" stroke="#e3a3a3"/>
  <text x="44" y="112" class="ph" fill="#b02a2a">&#10007; Four separate semaphores</text>

  <!-- four jobs -->
  <rect x="44" y="128" width="118" height="34" rx="8" fill="#ffffff" stroke="#e3a3a3"/>
  <text x="103" y="144" text-anchor="middle" class="job">GR watcher</text>
  <text x="103" y="156" text-anchor="middle" class="jobs">ungated</text>
  <rect x="44" y="170" width="118" height="34" rx="8" fill="#ffffff" stroke="#e3a3a3"/>
  <text x="103" y="186" text-anchor="middle" class="job">Stock sync</text>
  <text x="103" y="198" text-anchor="middle" class="jobs">SEMA_SYNC=1</text>
  <rect x="44" y="212" width="118" height="34" rx="8" fill="#ffffff" stroke="#e3a3a3"/>
  <text x="103" y="228" text-anchor="middle" class="job">Auto-retry</text>
  <text x="103" y="240" text-anchor="middle" class="jobs">SEMA_RETRY=1</text>
  <rect x="44" y="254" width="118" height="34" rx="8" fill="#ffffff" stroke="#e3a3a3"/>
  <text x="103" y="270" text-anchor="middle" class="job">Hourly</text>
  <text x="103" y="282" text-anchor="middle" class="jobs">SEMA_HOURLY=1</text>

  <!-- four independent connections straight to ERP -->
  <path d="M162 145 L320 192" fill="none" stroke="#d64545" stroke-width="2" marker-end="url(#ar)"/>
  <path d="M162 187 L320 200" fill="none" stroke="#d64545" stroke-width="2" marker-end="url(#ar)"/>
  <path d="M162 229 L320 212" fill="none" stroke="#d64545" stroke-width="2" marker-end="url(#ar)"/>
  <path d="M162 271 L320 220" fill="none" stroke="#d64545" stroke-width="2" marker-end="url(#ar)"/>

  <!-- ERP node (problem) -->
  <rect x="326" y="170" width="96" height="74" rx="10" fill="#2b3a4a"/>
  <text x="374" y="198" text-anchor="middle" class="node">ERP</text>
  <text x="374" y="214" text-anchor="middle" class="nodes">XML-RPC</text>
  <text x="374" y="228" text-anchor="middle" class="nodes">conn limit</text>

  <!-- burst pill + outcome -->
  <rect x="44" y="304" width="124" height="22" rx="11" fill="#ffffff" stroke="#d64545"/>
  <text x="106" y="319" text-anchor="middle" class="lbl" fill="#d64545">4&#8211;5 AT ONCE</text>
  <text x="180" y="319" class="cap" fill="#b02a2a">burst past the pool</text>
  <rect x="44" y="334" width="378" height="32" rx="10" fill="#ffecec" stroke="#d64545"/>
  <text x="233" y="355" text-anchor="middle" class="end" fill="#b02a2a">Connection refused on bulk reads</text>
  <text x="44" y="390" class="cap" fill="#b02a2a">Each lock stops a job overlapping itself &#8212; not the others.</text>

  <!-- ================= RIGHT: FIX ================= -->
  <rect x="456" y="84" width="420" height="324" rx="12" fill="#e9f7ee" stroke="#a6dcb8"/>
  <text x="476" y="112" class="ph" fill="#2f7a37">&#10003; One shared gate</text>

  <!-- four jobs -->
  <rect x="476" y="128" width="112" height="32" rx="8" fill="#ffffff" stroke="#a6dcb8"/>
  <text x="532" y="148" text-anchor="middle" class="job">GR watcher</text>
  <rect x="476" y="166" width="112" height="32" rx="8" fill="#ffffff" stroke="#a6dcb8"/>
  <text x="532" y="186" text-anchor="middle" class="job">Stock sync</text>
  <rect x="476" y="204" width="112" height="32" rx="8" fill="#ffffff" stroke="#a6dcb8"/>
  <text x="532" y="224" text-anchor="middle" class="job">Auto-retry</text>
  <rect x="476" y="242" width="112" height="32" rx="8" fill="#ffffff" stroke="#a6dcb8"/>
  <text x="532" y="262" text-anchor="middle" class="job">Hourly</text>

  <!-- all funnel into the GATE -->
  <path d="M588 144 L640 196" fill="none" stroke="#7b8794" stroke-width="1.8" marker-end="url(#ag)"/>
  <path d="M588 182 L640 202" fill="none" stroke="#7b8794" stroke-width="1.8" marker-end="url(#ag)"/>
  <path d="M588 220 L640 210" fill="none" stroke="#7b8794" stroke-width="1.8" marker-end="url(#ag)"/>
  <path d="M588 258 L640 216" fill="none" stroke="#7b8794" stroke-width="1.8" marker-end="url(#ag)"/>

  <!-- GATE node -->
  <rect x="646" y="178" width="84" height="58" rx="10" fill="#2f9e44"/>
  <text x="688" y="203" text-anchor="middle" class="node">GATE</text>
  <text x="688" y="220" text-anchor="middle" class="nodes">Semaphore(1)</text>

  <!-- gate -> ERP, single paced stream -->
  <path d="M730 207 L778 207" fill="none" stroke="#2f9e44" stroke-width="2.2" marker-end="url(#agr)"/>
  <text x="754" y="198" text-anchor="middle" class="lbl" fill="#2f7a37">MAX 1</text>

  <!-- ERP node (healthy) -->
  <rect x="784" y="178" width="72" height="58" rx="10" fill="#1c7ed6"/>
  <text x="820" y="203" text-anchor="middle" class="node">ERP</text>
  <text x="820" y="220" text-anchor="middle" class="nodes">XML-RPC</text>

  <!-- outcome -->
  <rect x="476" y="334" width="380" height="32" rx="10" fill="#eafaf0" stroke="#2f9e44"/>
  <text x="666" y="355" text-anchor="middle" class="end" fill="#2f7a37">One call stream &#183; pool stays healthy</text>
  <text x="476" y="390" class="cap" fill="#2f7a37">Module imports are singletons &#8212; id(GATE_A) == id(GATE_B) is True.</text>

  <!-- footer -->
  <rect x="30" y="424" width="840" height="34" rx="8" fill="#e7f1fb" stroke="#9ec5f0"/>
  <text x="450" y="446" text-anchor="middle" class="foot">When you split a scheduler into modules, carry the shared gate explicitly &#8212; or n modules become n concurrent callers.</text>
</svg>
