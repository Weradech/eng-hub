<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 470" width="900" height="470" role="img" aria-label="Two drifted inventory systems are reconciled in one direction by overwriting WMS to match ERP in three tagged passes, then verifying with an audit trail and a restorable snapshot">
  <style>
    text{font-family:'Segoe UI',Roboto,'Helvetica Neue',Arial,sans-serif}
    .title{font-size:23px;font-weight:700;fill:#1f2933}
    .sub{font-size:13.5px;fill:#52606d}
    .ph{font-size:14px;font-weight:700}
    .bx{font-size:13px;font-weight:700;fill:#1f2933}
    .bxs{font-size:11px;fill:#52606d}
    .wh{font-size:13px;font-weight:700;fill:#ffffff}
    .whs{font-size:10.5px;fill:#cbd2d9}
    .lbl{font-size:10.5px;font-weight:700;letter-spacing:.5px}
    .mono{font-family:'SFMono-Regular',Consolas,'Liberation Mono',monospace;font-size:9.5px;font-weight:700}
    .num{font-size:14px;font-weight:800;fill:#ffffff}
    .foot{font-size:13px;fill:#3e4c59}
  </style>
  <rect width="900" height="470" fill="#ffffff"/>
  <text x="30" y="40" class="title">The authoritative overwrite</text>
  <text x="30" y="64" class="sub">Two systems drifted &#8212; pick one as truth, overwrite the other in one direction, and leave a tagged trail.</text>

  <defs>
    <marker id="ga" markerWidth="9" markerHeight="9" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 z" fill="#7b8794"/></marker>
    <marker id="gb" markerWidth="10" markerHeight="10" refX="6.5" refY="3" orient="auto"><path d="M0,0 L6.5,3 L0,6 z" fill="#1c7ed6"/></marker>
    <marker id="gn" markerWidth="9" markerHeight="9" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 z" fill="#9aa5b1"/></marker>
  </defs>

  <!-- ===== BEFORE: two drifted systems ===== -->
  <rect x="30" y="96" width="190" height="118" rx="12" fill="#fbeaea" stroke="#e3a3a3"/>
  <text x="125" y="120" text-anchor="middle" class="ph" fill="#b02a2a">Drifted</text>

  <!-- ERP authoritative -->
  <rect x="46" y="132" width="158" height="34" rx="8" fill="#e7f1fb" stroke="#9ec5f0"/>
  <text x="58" y="148" class="bx" fill="#1c5fa8">ERP</text>
  <text x="58" y="161" class="bxs">authoritative</text>
  <text x="186" y="155" text-anchor="end" class="bx" fill="#1c5fa8">38,357</text>
  <!-- WMS diverged -->
  <rect x="46" y="172" width="158" height="34" rx="8" fill="#ffffff" stroke="#e3a3a3"/>
  <text x="58" y="188" class="bx" fill="#b02a2a">WMS</text>
  <text x="58" y="201" class="bxs">over-counts</text>
  <text x="186" y="195" text-anchor="end" class="bx" fill="#b02a2a">39,005</text>

  <!-- arrow into the funnel -->
  <path d="M222 155 L262 155" fill="none" stroke="#7b8794" stroke-width="2" marker-end="url(#ga)"/>

  <!-- ===== SNAPSHOT escape hatch ===== -->
  <rect x="264" y="120" width="118" height="70" rx="10" fill="#f5f7fa" stroke="#cbd2d9" stroke-dasharray="5 4"/>
  <text x="323" y="142" text-anchor="middle" class="bx" fill="#52606d">Snapshot</text>
  <text x="323" y="159" text-anchor="middle" class="bxs">pg_dump &#183; gzip</text>
  <text x="323" y="174" text-anchor="middle" class="bxs">restore in &lt; 5 min</text>
  <path d="M382 155 L420 155" fill="none" stroke="#7b8794" stroke-width="2" marker-end="url(#ga)"/>
  <text x="401" y="146" text-anchor="middle" class="lbl" fill="#7b8794">FIRST</text>

  <!-- ===== ACTION: three tagged passes (overwrite in ONE direction) ===== -->
  <rect x="422" y="92" width="316" height="200" rx="12" fill="#e7f1fb" stroke="#9ec5f0"/>
  <text x="438" y="114" class="ph" fill="#1c5fa8">Overwrite WMS := ERP, in 3 tagged passes</text>

  <!-- Pass 1 -->
  <rect x="438" y="124" width="284" height="44" rx="8" fill="#ffffff" stroke="#9ec5f0"/>
  <circle cx="460" cy="146" r="13" fill="#1c7ed6"/>
  <text x="460" y="151" text-anchor="middle" class="num">1</text>
  <text x="482" y="142" class="bx">OVERWRITE</text>
  <text x="482" y="158" class="bxs">set every WMS qty = live ERP qty</text>
  <rect x="640" y="135" width="74" height="20" rx="10" fill="#eaf3fc" stroke="#9ec5f0"/>
  <text x="677" y="149" text-anchor="middle" class="mono" fill="#1c5fa8">&#8230;0612</text>

  <!-- Pass 2 -->
  <rect x="438" y="172" width="284" height="44" rx="8" fill="#ffffff" stroke="#9ec5f0"/>
  <circle cx="460" cy="194" r="13" fill="#1c7ed6"/>
  <text x="460" y="199" text-anchor="middle" class="num">2</text>
  <text x="482" y="190" class="bx">RELEASE</text>
  <text x="482" y="206" class="bxs">drop reservations ERP already consumed</text>
  <rect x="640" y="183" width="74" height="20" rx="10" fill="#eaf3fc" stroke="#9ec5f0"/>
  <text x="677" y="197" text-anchor="middle" class="mono" fill="#1c5fa8">&#8230;-RESV</text>

  <!-- Pass 3 -->
  <rect x="438" y="220" width="284" height="44" rx="8" fill="#ffffff" stroke="#9ec5f0"/>
  <circle cx="460" cy="242" r="13" fill="#1c7ed6"/>
  <text x="460" y="247" text-anchor="middle" class="num">3</text>
  <text x="482" y="238" class="bx">VOID</text>
  <text x="482" y="254" class="bxs">cancel IQC/QA for stock now zeroed</text>
  <rect x="640" y="231" width="74" height="20" rx="10" fill="#eaf3fc" stroke="#9ec5f0"/>
  <text x="677" y="245" text-anchor="middle" class="mono" fill="#1c5fa8">&#8230;-IQC</text>

  <text x="438" y="282" class="bxs" fill="#1c5fa8">Via the service layer, not raw SQL &#183; each pass is an auditable movement, never a silent edit.</text>

  <!-- one-direction arrow into the result -->
  <path d="M738 192 L786 192" fill="none" stroke="#1c7ed6" stroke-width="2.5" marker-end="url(#gb)"/>
  <text x="762" y="183" text-anchor="middle" class="lbl" fill="#1c7ed6">ONE WAY</text>

  <!-- ===== AFTER: aligned + verified ===== -->
  <rect x="660" y="300" width="210" height="92" rx="12" fill="#e9f7ee" stroke="#a6dcb8"/>
  <text x="676" y="324" class="ph" fill="#2f7a37">&#10003; Aligned</text>
  <text x="676" y="344" class="bxs">ERP qty == WMS qty &#183; 0 diffs</text>
  <text x="676" y="362" class="bxs">no negatives &#183; no orphan rows</text>
  <text x="676" y="380" class="bxs">all health endpoints 200 OK</text>

  <!-- verify gate then re-enable sync -->
  <rect x="438" y="312" width="200" height="68" rx="10" fill="#fff4e0" stroke="#f3c677"/>
  <text x="538" y="336" text-anchor="middle" class="bx" fill="#9a5b00">Verify BEFORE sync</text>
  <text x="538" y="356" text-anchor="middle" class="bxs">re-enabling sync on a failing</text>
  <text x="538" y="371" text-anchor="middle" class="bxs">check masks the real discrepancy</text>
  <path d="M638 346 L654 346" fill="none" stroke="#7b8794" stroke-width="2" marker-end="url(#ga)"/>

  <!-- audit trail callout -->
  <rect x="30" y="312" width="390" height="68" rx="10" fill="#f5f7fa" stroke="#cbd2d9"/>
  <text x="46" y="334" class="bx" fill="#52606d">Audit trail = one query by tag prefix</text>
  <text x="46" y="354" class="mono" fill="#3e4c59" font-size="11">WHERE tag LIKE 'OVERWRITE-ERP-0612%'</text>
  <text x="46" y="372" class="bxs">answers &#8220;what did the overwrite change?&#8221; &#8212; and reverses it.</text>

  <!-- footer -->
  <rect x="30" y="402" width="840" height="38" rx="8" fill="#e7f1fb" stroke="#9ec5f0"/>
  <text x="450" y="426" text-anchor="middle" class="foot">Reconcile in one direction, snapshot first, tag every adjustment &#8212; the overwrite buys a clean baseline; idempotent writes keep it.</text>
</svg>
