<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 470" width="900" height="470" role="img" aria-label="Pipeline: a goods-receipt event builds an Adaptive Card dict, posts it to the Teams Workflows webhook, and the card renders in the channel; the gotcha is that content must be a dict, not a json.dumps string">
  <style>
    text{font-family:'Segoe UI',Roboto,'Helvetica Neue',Arial,sans-serif}
    .title{font-size:23px;font-weight:700;fill:#1f2933}
    .sub{font-size:13.5px;fill:#52606d}
    .wh{font-size:13px;font-weight:700;fill:#ffffff}
    .whs{font-size:11px;fill:#cbd2d9}
    .bx{font-size:13px;font-weight:700;fill:#1f2933}
    .bxs{font-size:11.5px;fill:#52606d}
    .lbl{font-size:10px;font-weight:700;letter-spacing:.8px}
    .mono{font-family:'SFMono-Regular',Consolas,'Liberation Mono',monospace;font-size:11px}
    .foot{font-size:13px;fill:#3e4c59}
  </style>
  <rect width="900" height="470" fill="#ffffff"/>
  <text x="30" y="40" class="title">Warehouse events &#8594; Teams Adaptive Cards</text>
  <text x="30" y="64" class="sub">Poll the ERP, build the card as a dict, POST to the Workflows webhook &#8212; the card&#8217;s content must never be a JSON string.</text>

  <defs>
    <marker id="ga" markerWidth="9" markerHeight="9" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 z" fill="#7b8794"/></marker>
    <marker id="gb" markerWidth="9" markerHeight="9" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 z" fill="#1c7ed6"/></marker>
  </defs>

  <!-- STEP 1: GR event -->
  <rect x="30" y="104" width="190" height="76" rx="10" fill="#2b3a4a"/>
  <text x="125" y="132" text-anchor="middle" class="wh">GR picking = done</text>
  <text x="125" y="150" text-anchor="middle" class="whs">30-min ERP poll, not webhook</text>
  <text x="125" y="167" text-anchor="middle" class="whs">dedup via receipt_email_log</text>
  <path d="M220 142 L250 142" fill="none" stroke="#7b8794" stroke-width="2" marker-end="url(#ga)"/>

  <!-- STEP 2: build card dict -->
  <rect x="252" y="104" width="190" height="76" rx="10" fill="#e7f1fb" stroke="#9ec5f0"/>
  <text x="347" y="130" text-anchor="middle" class="bx" fill="#1c5fa8">Build Adaptive Card</text>
  <text x="347" y="148" text-anchor="middle" class="bxs">v1.2 &#183; TextBlock + FactSet</text>
  <text x="347" y="165" text-anchor="middle" class="bxs">PO &#183; Supplier &#183; Items &#183; Action</text>
  <path d="M442 142 L472 142" fill="none" stroke="#7b8794" stroke-width="2" marker-end="url(#ga)"/>

  <!-- STEP 3: POST to webhook -->
  <rect x="474" y="104" width="190" height="76" rx="10" fill="#e7f1fb" stroke="#9ec5f0"/>
  <text x="569" y="130" text-anchor="middle" class="bx" fill="#1c5fa8">POST to Workflows</text>
  <text x="569" y="148" text-anchor="middle" class="bxs">requests.post(url, json=payload)</text>
  <text x="569" y="165" text-anchor="middle" class="bxs">URL is the only auth</text>
  <path d="M664 142 L694 142" fill="none" stroke="#1c7ed6" stroke-width="2" marker-end="url(#gb)"/>

  <!-- STEP 4: card renders -->
  <rect x="696" y="104" width="174" height="76" rx="10" fill="#e9f7ee" stroke="#a6dcb8"/>
  <text x="783" y="130" text-anchor="middle" class="bx" fill="#2f7a37">Card in channel</text>
  <text x="783" y="148" text-anchor="middle" class="bxs">team sees the GR live</text>
  <text x="783" y="165" text-anchor="middle" class="bxs">no &#8220;check the system&#8221;</text>

  <!-- step number labels -->
  <text x="40" y="98" class="lbl" fill="#7b8794">1 &#183; EVENT</text>
  <text x="262" y="98" class="lbl" fill="#1c7ed6">2 &#183; PAYLOAD</text>
  <text x="484" y="98" class="lbl" fill="#1c7ed6">3 &#183; DELIVER</text>
  <text x="706" y="98" class="lbl" fill="#2f7a37">4 &#183; RENDER</text>

  <!-- THE GOTCHA: code contrast -->
  <text x="30" y="222" class="lbl" fill="#9a5b00">&#9888; THE ONE-CHARACTER BUG &#8212; double-serialized content fails with InvalidBotRequestMessageBody</text>

  <!-- BROKEN box -->
  <rect x="30" y="234" width="410" height="118" rx="10" fill="#fbeaea" stroke="#e3a3a3"/>
  <text x="48" y="258" class="bx" fill="#b02a2a">&#10007; BROKEN &#8212; content is a string</text>
  <rect x="48" y="270" width="374" height="68" rx="7" fill="#ffffff" stroke="#e3a3a3"/>
  <text x="62" y="290" class="mono" fill="#52606d">&#34;contentType&#34;: &#34;...card.adaptive&#34;,</text>
  <text x="62" y="308" class="mono" fill="#b02a2a">&#34;content&#34;: json.dumps(card)</text>
  <text x="62" y="328" class="mono" fill="#a61b1b">// requests double-serializes &#8594; 400</text>

  <!-- CORRECT box -->
  <rect x="460" y="234" width="410" height="118" rx="10" fill="#e9f7ee" stroke="#a6dcb8"/>
  <text x="478" y="258" class="bx" fill="#2f7a37">&#10003; CORRECT &#8212; content is the dict</text>
  <rect x="478" y="270" width="374" height="68" rx="7" fill="#ffffff" stroke="#a6dcb8"/>
  <text x="492" y="290" class="mono" fill="#52606d">&#34;contentType&#34;: &#34;...card.adaptive&#34;,</text>
  <text x="492" y="308" class="mono" fill="#2f7a37">&#34;content&#34;: card</text>
  <text x="492" y="328" class="mono" fill="#2f7a37">// json=payload serializes once &#8594; 200</text>

  <!-- side notes -->
  <rect x="30" y="368" width="410" height="34" rx="8" fill="#fff4e0" stroke="#f3c677"/>
  <text x="48" y="390" class="bxs" fill="#9a5b00">&#9888; Use \n\n in TextBlock text &#8212; \r\n renders as literal \r in some clients.</text>
  <rect x="460" y="368" width="410" height="34" rx="8" fill="#f5f7fa" stroke="#cbd2d9"/>
  <text x="478" y="390" class="bxs" fill="#52606d">Throttle outage alerts (1 / 30 min) &#8212; the poller would otherwise spam the channel.</text>

  <rect x="30" y="416" width="840" height="32" rx="8" fill="#e7f1fb" stroke="#9ec5f0"/>
  <text x="450" y="437" text-anchor="middle" class="foot">The webhook wants a JSON object; sending a JSON string fails silently as a 400 &#8212; the fix is deleting json.dumps().</text>
</svg>
