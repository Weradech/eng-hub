<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 470" width="900" height="470" role="img" aria-label="Before calling it lost stock, rule out three cheaper explanations">
  <style>
    text{font-family:'Segoe UI',Roboto,'Helvetica Neue',Arial,sans-serif}
    .title{font-size:23px;font-weight:700;fill:#1f2933}
    .sub{font-size:13.5px;fill:#52606d}
    .num{font-size:22px;font-weight:800;fill:#ffffff}
    .step{font-size:16px;font-weight:700;fill:#1f2933}
    .ex{font-size:12.5px;fill:#52606d}
    .tag{font-size:11px;font-weight:700;letter-spacing:.5px}
    .foot{font-size:13px;fill:#3e4c59}
  </style>
  <rect width="900" height="470" fill="#ffffff"/>
  <text x="30" y="40" class="title">Is the number wrong, or is the stock gone?</text>
  <text x="30" y="64" class="sub">A reconciliation alert measures your records, not your reality. Rule these out before you panic.</text>

  <!-- vertical re-derive arrow -->
  <line x1="60" y1="96" x2="60" y2="392" stroke="#1c7ed6" stroke-width="2.5"/>
  <polygon points="60,400 54,388 66,388" fill="#1c7ed6"/>
  <text x="44" y="250" transform="rotate(-90 44 250)" text-anchor="middle" class="tag" fill="#1c7ed6">RE-DERIVE LIVE AT EVERY STEP</text>

  <!-- Step 1 -->
  <g>
    <rect x="84" y="96" width="786" height="64" rx="10" fill="#e7f1fb" stroke="#9ec5f0"/>
    <circle cx="120" cy="128" r="22" fill="#1c7ed6"/>
    <text x="120" y="136" text-anchor="middle" class="num">1</text>
    <text x="160" y="124" class="step">The reported number is wrong</text>
    <text x="160" y="146" class="ex">Append-only alert log accumulated &#8212; ~60% of the &#8220;1.8M drift&#8221; was phantom; live re-check matched.</text>
    <rect x="734" y="116" width="118" height="24" rx="12" fill="#ffffff" stroke="#1c7ed6"/>
    <text x="793" y="132" text-anchor="middle" class="tag" fill="#1c7ed6">FIX THE REPORT</text>
  </g>

  <!-- Step 2 -->
  <g>
    <rect x="84" y="172" width="786" height="64" rx="10" fill="#e7f1fb" stroke="#9ec5f0"/>
    <circle cx="120" cy="204" r="22" fill="#1c7ed6"/>
    <text x="120" y="212" text-anchor="middle" class="num">2</text>
    <text x="160" y="200" class="step">The derived view is wrong</text>
    <text x="160" y="222" class="ex">A balance column was backfilled wrong at insert. Fix: anchor on today&#8217;s live on-hand, walk backward.</text>
    <rect x="734" y="192" width="118" height="24" rx="12" fill="#ffffff" stroke="#1c7ed6"/>
    <text x="793" y="208" text-anchor="middle" class="tag" fill="#1c7ed6">FIX THE ANCHOR</text>
  </g>

  <!-- Step 3 -->
  <g>
    <rect x="84" y="248" width="786" height="64" rx="10" fill="#fff4e0" stroke="#f3c677"/>
    <circle cx="120" cy="280" r="22" fill="#f08c00"/>
    <text x="120" y="288" text-anchor="middle" class="num">3</text>
    <text x="160" y="276" class="step">Records disagree &#8212; but the stock is fine</text>
    <text x="160" y="298" class="ex">One system recorded an op the other never mirrored (subcon consume, direct delivery). A sync gap.</text>
    <rect x="724" y="268" width="128" height="24" rx="12" fill="#ffffff" stroke="#f08c00"/>
    <text x="788" y="284" text-anchor="middle" class="tag" fill="#d9760a">MIRROR THE EVENT</text>
  </g>

  <!-- Step 4 -->
  <g>
    <rect x="84" y="324" width="786" height="64" rx="10" fill="#fbeaea" stroke="#e3a3a3"/>
    <circle cx="120" cy="356" r="22" fill="#d64545"/>
    <text x="120" y="364" text-anchor="middle" class="num">4</text>
    <text x="160" y="352" class="step">The stock is actually missing</text>
    <text x="160" y="374" class="ex">The only line that earns the word &#8220;loss&#8221; &#8212; and only after 1&#8211;3 are ruled out.</text>
    <rect x="724" y="344" width="128" height="24" rx="12" fill="#ffffff" stroke="#d64545"/>
    <text x="788" y="360" text-anchor="middle" class="tag" fill="#b02a2a">THEN INVESTIGATE</text>
  </g>

  <text x="450" y="430" text-anchor="middle" class="foot">Round one is a draft. Trust a number only when a second, independent path reproduces it.</text>
</svg>
